name: Release

# Единый релизный workflow по push'у тэга `v*`.
#
# Порядок (через jobs.needs):
#   1) release             — контракты + контейнеры + webhook деплоя (атомарно)
#   2) publish-packages    — npm publish через lerna (если не -alpha)
#   3) publish-docs        — mkdocs + standards-site → gh-pages (если не -alpha + ветка main)
#   4) trigger-coopenomics — repository_dispatch в coopenomics/coopenomics (тот же гейт, что docs)
#
# Зачем последовательно: пакеты/доки/внешний триггер не должны уезжать,
# если релиз контрактов или контейнеров провалился. Раньше четыре workflow'а
# стартовали параллельно по одному тэгу — отсюда гонка из инцидента 2026-05-13
# с ledger2 walletop sweep'ом (см. историю release.yaml до объединения).
#
# Гейт `-alpha` унифицирован: пакеты + доки + триггер docs пропускают только
# не-alpha тэги. -beta/-rc/-test в проекте не используются (см. CLAUDE.md),
# поэтому проще иметь один паттерн `!contains(github.ref, '-alpha')`.
# IS_PROD в release-job остаётся на `(alpha|beta|rc|test)` — он определяет
# деплой-webhook (testnet vs production) и тэг `:latest` у образов;
# намеренно строже, чтобы случайный -rc-тэг не уехал на прод.
#
# Резолв ветки. Тэг семантики окружения не несёт (например `v2026.5.13-alpha-2`
# может лежать на testnet или dev — определяет именно ветка, на которую сделан
# merge перед тэгом). Поэтому ищем первое совпадение SHA с remote-ветками
# main/testnet/dev. branch экспортируется как outputs.branch для downstream jobs.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.resolve.outputs.tag_name }}
      branch: ${{ steps.resolve.outputs.branch }}
      is_prod: ${{ steps.resolve.outputs.is_prod }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve branch, build mode and tags
        id: resolve
        run: |
          TAG_NAME="${{ github.ref_name }}"
          SHA="${{ github.sha }}"
          BRANCH=""
          for candidate in main testnet dev; do
            if git branch -r --contains "$SHA" 2>/dev/null | grep -qE "^[[:space:]]*origin/${candidate}$"; then
              BRANCH="$candidate"
              break
            fi
          done
          if [ -z "$BRANCH" ]; then
            echo "::error::Тэг $TAG_NAME ($SHA) не лежит ни на одной из dev/testnet/main"
            exit 1
          fi

          case "$BRANCH" in
            main)
              BUILD_MODE=prod
              CONTRACTS_TAG=main
              CONTRACTS_EXTRA=latest
              ;;
            testnet)
              BUILD_MODE=test
              CONTRACTS_TAG=testnet
              CONTRACTS_EXTRA=
              ;;
            dev)
              BUILD_MODE=test
              CONTRACTS_TAG=dev
              CONTRACTS_EXTRA=
              ;;
          esac

          # IS_PROD определяет webhook деплоя (PRODUCTION vs TESTNET) и тэг :latest.
          # Сознательно строже гейта publish-* — случайный -rc/-beta тэг не должен
          # уехать на прод-вебхук, даже если в npm/docs его опубликовали.
          if [[ "$TAG_NAME" =~ -(alpha|beta|rc|test) ]]; then
            IS_PROD=false
            WEBHOOK_URL='${{ vars.TESTNET_WEBHOOK_URL }}'
          else
            IS_PROD=true
            WEBHOOK_URL='${{ vars.PRODUCTION_WEBHOOK_URL }}'
          fi

          {
            echo "TAG_NAME=$TAG_NAME"
            echo "SHA=$SHA"
            echo "BRANCH=$BRANCH"
            echo "BUILD_MODE=$BUILD_MODE"
            echo "CONTRACTS_TAG=$CONTRACTS_TAG"
            echo "CONTRACTS_EXTRA=$CONTRACTS_EXTRA"
            echo "IS_PROD=$IS_PROD"
            echo "WEBHOOK_URL=$WEBHOOK_URL"
          } >> "$GITHUB_ENV"

          {
            echo "tag_name=$TAG_NAME"
            echo "branch=$BRANCH"
            echo "is_prod=$IS_PROD"
          } >> "$GITHUB_OUTPUT"

          echo "Release $TAG_NAME → branch=$BRANCH, build_mode=$BUILD_MODE, contracts:$CONTRACTS_TAG, prod=$IS_PROD"

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # === Этап 1: контракты ===

      - name: Pull CDT toolchain image
        run: docker pull dicoop/blockchain_v5.1.1:dev

      - name: Compile contracts
        working-directory: components/contracts
        run: |
          ./build-all.sh "$BUILD_MODE"
          echo "--- build/contracts ---"
          ls -la build/contracts/

      - name: Stage contracts docker context
        working-directory: components/contracts
        run: |
          ROOT="docker/.context"
          rm -rf "$ROOT"
          mkdir -p "$ROOT/contracts"

          # Имена контрактов = аргументы add_contract_build(...) только в
          # незакомменченных строках (CMake-комментарий начинается с `#`).
          NAMES=$(grep -E '^[[:space:]]*add_contract_build\(' CMakeLists.txt \
                   | sed -E 's/^[[:space:]]*add_contract_build\(([^)]*)\).*/\1/')
          echo "Contracts to package:"
          echo "$NAMES"

          MANIFEST="$ROOT/contracts/manifest.json"

          pack_one() {
            local NAME="$1" WASM="$2" ABI="$3"
            if [ ! -f "$WASM" ] || [ ! -f "$ABI" ]; then
              echo "::warning::Skipping $NAME: artifacts missing ($WASM / $ABI)" >&2
              return 1
            fi
            mkdir -p "$ROOT/contracts/$NAME"
            cp "$WASM" "$ROOT/contracts/$NAME/$NAME.wasm"
            cp "$ABI"  "$ROOT/contracts/$NAME/$NAME.abi"
            local SHA_WASM=$(sha256sum "$WASM" | awk '{print $1}')
            local SHA_ABI=$(sha256sum  "$ABI"  | awk '{print $1}')
            printf '    {"name":"%s","sha256_wasm":"%s","sha256_abi":"%s"}' \
                   "$NAME" "$SHA_WASM" "$SHA_ABI"
          }

          {
            printf '{\n'
            printf '  "build_mode": "%s",\n' "$BUILD_MODE"
            printf '  "git_sha": "%s",\n' "$SHA"
            printf '  "tag": "%s",\n'    "$TAG_NAME"
            printf '  "branch": "%s",\n' "$BRANCH"
            printf '  "built_at": "%s",\n' "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            printf '  "contracts": [\n'

            FIRST=1
            emit() {
              entry=$(pack_one "$@") || return 0
              [ $FIRST -eq 0 ] && printf ',\n'
              FIRST=0
              printf '%s' "$entry"
            }

            for c in $NAMES; do
              if [ "$c" = "system" ]; then
                # У system многоконтрактная сборка: разносим под-контракты
                # eosio.* как полноценные элементы каталога, сам "system"
                # как имя пропускаем.
                for sub in build/contracts/system/contracts/eosio.*/; do
                  [ -d "$sub" ] || continue
                  sub_name=$(basename "$sub")
                  emit "$sub_name" "$sub/$sub_name.wasm" "$sub/$sub_name.abi"
                done
              else
                emit "$c" "build/contracts/$c/$c.wasm" "build/contracts/$c/$c.abi"
              fi
            done

            printf '\n  ]\n'
            printf '}\n'
          } > "$MANIFEST"

          cp docker/Dockerfile     "$ROOT/Dockerfile"
          cp docker/entrypoint.sh  "$ROOT/entrypoint.sh"
          chmod +x "$ROOT/entrypoint.sh"

          echo "--- manifest.json ---"
          cat "$MANIFEST"

      - name: Build and push contracts image
        working-directory: components/contracts
        run: |
          IMAGE="dicoop/contracts"
          SHORT_SHA="${SHA::7}"
          docker build \
            --label "org.opencontainers.image.revision=$SHA" \
            --label "org.opencontainers.image.created=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --label "build.mode=$BUILD_MODE" \
            -t "$IMAGE:$CONTRACTS_TAG" \
            ./docker/.context
          docker push "$IMAGE:$CONTRACTS_TAG"

          docker tag "$IMAGE:$CONTRACTS_TAG" "$IMAGE:$CONTRACTS_TAG-$SHORT_SHA"
          docker push "$IMAGE:$CONTRACTS_TAG-$SHORT_SHA"

          if [ -n "$CONTRACTS_EXTRA" ]; then
            docker tag "$IMAGE:$CONTRACTS_TAG" "$IMAGE:$CONTRACTS_EXTRA"
            docker push "$IMAGE:$CONTRACTS_EXTRA"
          fi

      - name: Verify pushed contracts image
        run: |
          docker run --rm "dicoop/contracts:$CONTRACTS_TAG" list
          echo "---"
          docker run --rm "dicoop/contracts:$CONTRACTS_TAG" sha256

      # === Этап 2: контейнеры приложений ===

      - name: Build and push base image
        run: |
          docker build --target runtime -t "dicoop/mono-base:$TAG_NAME" .
          docker push "dicoop/mono-base:$TAG_NAME"
          if [ "$IS_PROD" = "true" ]; then
            docker tag "dicoop/mono-base:$TAG_NAME" dicoop/mono-base:latest
            docker push dicoop/mono-base:latest
          fi

      - name: Build and push service images
        run: |
          build_service() {
            local SVC="$1" PKG="$2" CMD="$3"
            local DOCKERFILE="Dockerfile.$SVC"
            {
              echo "FROM dicoop/mono-base:$TAG_NAME"
              echo "CMD [\"pnpm\", \"-F\", \"$PKG\", \"run\", \"$CMD\"]"
            } > "$DOCKERFILE"
            docker build -t "dicoop/$SVC:$TAG_NAME" -f "$DOCKERFILE" .
            docker push "dicoop/$SVC:$TAG_NAME"
            if [ "$IS_PROD" = "true" ]; then
              docker tag "dicoop/$SVC:$TAG_NAME" "dicoop/$SVC:latest"
              docker push "dicoop/$SVC:latest"
            fi
          }

          build_service desktop       '@coopenomics/desktop'        start
          build_service coopback      '@coopenomics/controller'     start
          # TEMP: cooparser — пока не мигрировали потребителей на dicoop/parser
          # из отдельного coopenomics/parser repo.
          build_service cooparser     '@coopenomics/parser'         start
          build_service notificator   'coop-notificator'            start
          build_service notifications '@coopenomics/notifications'  sync

      # === Этап 3: webhook деплоя ===

      - name: Trigger deployment webhook
        run: |
          curl -X POST "$WEBHOOK_URL" \
            -H 'Content-Type: application/json' \
            -d "$TAG_NAME"

  # ============================================================================
  # publish-packages — npm publish (бывший publish-packages.yaml).
  # Гейт: не-alpha. Не зависит от ветки.
  # Жёстко прибиваем версию pnpm, которой сгенерён lockfile (lockfileVersion 9.0
  # = pnpm 9/10). Иначе action-setup может подтянуть другую версию и переписать
  # pnpm-lock.yaml → Lerna EUNCOMMIT.
  # ============================================================================
  publish-packages:
    needs: release
    if: ${{ !contains(github.ref, '-alpha') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm lerna run build
      - run: pnpm lerna publish from-package --yes
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ============================================================================
  # publish-docs — mkdocs + standards-site → gh-pages (бывший publish-docs.yaml).
  # Гейт: не-alpha + ветка main.
  # ВНИМАНИЕ: gh-pages step пушит на github.com/coopenomics/mono — это GitHub
  # Pages. При переезде на Gitea Actions нужно будет либо подложить PAT для
  # внешнего push'а в GitHub, либо переключить публикацию на Gitea Pages.
  # ============================================================================
  publish-docs:
    needs: release
    if: ${{ !contains(github.ref, '-alpha') && needs.release.outputs.branch == 'main' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Версия pnpm берётся из `packageManager` корневого package.json,
      # синхронно с publish-packages job'ом и Dockerfile'ами.
      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Python requirements
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install mkdocs-material mkdocs-macros-plugin mkdocs-section-index pymdown-extensions
        working-directory: ./components/docs

      - name: Install Node.js dependencies
        run: pnpm install
        working-directory: ./components/docs

      - name: Patch spectaql-config.yml for CI
        run: |
          sed -i.bak "0,/url:.*/s|url:.*|url: 'https://testnet.coopenomics.world/backend/v1/graphql'|" spectaql-config.yml
        working-directory: ./components/controller

      - name: Show patched spectaql-config.yml
        run: cat spectaql-config.yml
        working-directory: ./components/controller

      - name: Build cooptypes
        run: pnpm run build
        working-directory: ./components/cooptypes

      - name: Generate controller docs
        run: pnpm run docs
        working-directory: ./components/controller

      - name: Copy controller docs
        run: |
          mkdir -p ./components/docs/docs/graphql
          cp -r ./components/controller/docs/* ./components/docs/docs/graphql/

      - name: Generate sdk docs
        run: pnpm run docs
        working-directory: ./components/sdk

      - name: Copy sdk docs
        run: |
          mkdir -p ./components/docs/docs/sdk
          cp -r ./components/sdk/docs/* ./components/docs/docs/sdk/

      - name: Generate cooptypes docs
        run: pnpm run docs
        working-directory: ./components/cooptypes

      - name: Copy cooptypes docs
        run: |
          mkdir -p ./components/docs/docs/cooptypes
          cp -r ./components/cooptypes/docs/* ./components/docs/docs/cooptypes/

      # ── standards-site → /standards/ на docs.цифровой-кооператив.рф ──
      # Отдельный Vue-сайт с BPMN-графом кооперативных стандартов,
      # публикуется как поддиректория на том же домене. Vite собирает
      # с base='/standards/' (см. vite.config.ts), относительные пути
      # внутри dist/ и hash-router работают корректно.
      # dist кладём в docs/standards/ ДО mkdocs build — так же, как
      # graphql/sdk/cooptypes; mkdocs сам включит его в итоговый site/.
      - name: Build standards-site
        run: pnpm run build
        working-directory: ./components/contracts/standards-site

      - name: Copy standards-site into docs/standards
        run: |
          mkdir -p ./components/docs/docs/standards
          cp -r ./components/contracts/standards-site/dist/* ./components/docs/docs/standards/

      - name: Build docs (mkdocs)
        run: |
          source venv/bin/activate
          mkdocs build
        working-directory: ./components/docs

      - name: Remove specific large file before publishing
        run: |
          rm -f ./components/docs/site/sdk/typedoc.json
          if [ -f "./components/docs/site/sdk/typedoc.json" ]; then
            echo "ERROR: typedoc.json still exists!"
            exit 1
          else
            echo "SUCCESS: typedoc.json removed successfully"
          fi

      - name: Publish to GitHub Pages
        run: npx gh-pages --nojekyll -d site --repo https://x-access-token:${GITHUB_TOKEN}@github.com/coopenomics/mono.git
        working-directory: ./components/docs
        env:
          GIT_AUTHOR_NAME: github-actions
          GIT_AUTHOR_EMAIL: github-actions@github.com
          GIT_COMMITTER_NAME: github-actions
          GIT_COMMITTER_EMAIL: github-actions@github.com
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trigger docs deployment webhook
        if: ${{ success() }}
        run: |
          curl -X POST "${{ vars.DOCS_DEPLOY_WEBHOOK_URL }}" \
            -H 'Content-Type: application/json' \
            -d '{"ref":"${{ github.ref }}","sha":"${{ github.sha }}","branch":"${{ github.ref_name }}"}'

  # ============================================================================
  # trigger-coopenomics-docs — repository_dispatch в coopenomics/coopenomics
  # (бывший build-contracts-docs.yaml). Гейт идентичен publish-docs.
  # ============================================================================
  trigger-coopenomics-docs:
    needs: release
    if: ${{ !contains(github.ref, '-alpha') && needs.release.outputs.branch == 'main' }}
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Coopenomics deployment
        uses: peter-evans/repository-dispatch@v2
        with:
          token: ${{ secrets.COOPENOMICS_PAT }}
          repository: coopenomics/coopenomics
          event-type: deploy_from_mono
          client-payload: '{"repository": "${{ github.repository }}", "sha": "${{ github.sha }}", "ref": "${{ github.ref }}", "actor": "${{ github.actor }}"}'
