# ─────────────────────────────────────────────────────────────────────────────
# Стандарт «Внесение паевого взноса» — деньгами, через целевую
# потребительскую программу «Цифровой Кошелёк» (SHARE_FUND_PAY).
#
# Одноактовый процесс: в ledger2 одна операция wall.depcpl. Документов
# не подписывается — взнос не требует оформления договора, он
# подтверждается самим фактом платежа.
#
# Источники правды в коде:
#   • cpp/wallet/wallet.hpp                                 — actions
#   • cpp/wallet/src/deposit/{createdpst,completedpst,declinedpst}.cpp
# ─────────────────────────────────────────────────────────────────────────────

# ── §1. Паспорт ─────────────────────────────────────────────────────────────
process_type: wall.deposit
title: Внесение паевого взноса
slug: deposit
status: proposed
contract: wallet
summary: >
  Пайщик пополняет свой цифровой кошелёк, делая дополнительный паевой
  взнос деньгами. Средства поступают в паевой фонд кооператива и
  одновременно становятся доступны пайщику на его кошельке SHARE_FUND_PAY.
purpose: >
  Это самый частый регулярный процесс — простой, одношаговый с точки
  зрения бухгалтерии. В блокчейне у него два действия (создание заявки
  и подтверждение платежа), в ledger2 — одна операция wall.depcpl,
  срабатывающая на подтверждении. Документов не оформляется: факт
  внесения подтверждается самим платежом через Gateway.

# ── §2. Действия контракта ──────────────────────────────────────────────────
actions:
  - name: wallet::createdpst
    human: Создать заявку
    actor: Пайщик
    purpose: >
      Пайщик инициирует внесение паевого взноса: приложение кооператива
      (подпись coopname) вызывает createdpst с суммой и уникальным
      deposit_hash. Контракт создаёт запись в таблице deposits со
      статусом `pending` и выпускает счёт в Gateway с коллбэками
      completedpst (успех) и declinedpst (отказ).
  - name: wallet::completedpst
    human: Подтвердить оплату
    actor: Оператор Gateway
    purpose: >
      Закрывающее действие сценария. Gateway подтвердил зачисление
      платежа пайщика на расчётный счёт кооператива. Контракт зачисляет
      средства на кошелёк SHARE_FUND_PAY пайщика, применяет в ledger2
      операцию wall.depcpl (Дт 51 / Кт 80) и удаляет запись заявки.
  - name: wallet::declinedpst
    human: Отклонить оплату
    actor: Оператор Gateway
    purpose: >
      Платёж не поступил или был отменён платёжной системой. Запись
      заявки удаляется, ledger2-операция не создаётся. Пайщик может
      повторить заявку.

# ── §3. Граф состояний ──────────────────────────────────────────────────────
# Сущность: wallet::deposit (таблица deposits, scope=coopname).
# Статус `completed` — виртуально-финальный: в реальности запись
# удаляется после completedpst. Узел в графе нужен, чтобы обозначить
# успешное завершение и привязать ledger2-операцию.
entity: wallet::deposit
entity_human: Заявка на взнос

states:
  - name: pending
    human: Ожидает оплаты
    description: >
      Заявка создана, в Gateway выпущен счёт, ожидается оплата от
      пайщика. Коллбэки Gateway: completedpst (успех) / declinedpst
      (отказ).
    kind: normal

  - name: completed
    human: Взнос учтён
    description: >
      Оплата подтверждена, средства учтены на кошельке SHARE_FUND_PAY
      пайщика и в бухгалтерии (Дт 51 / Кт 80). Запись заявки удалена
      из таблицы deposits.
    kind: final

  - name: removed
    human: Отклонено
    description: >
      Платёж не прошёл или был отменён, запись удалена, ledger2-операция
      не создавалась.
    kind: virtual

transitions:
  - from: "∅"
    to: pending
    action: wallet::createdpst
    actor: Пайщик
    guards:
      - Пайщик имеет статус active в кооперативе.
      - Сумма взноса положительна и в системном символе кооператива.
      - deposit_hash уникален.

  - from: pending
    to: completed
    action: wallet::completedpst
    actor: Оператор Gateway
    guards:
      - Gateway подтвердил зачисление платежа пайщика.

  - from: pending
    to: removed
    action: wallet::declinedpst
    actor: Оператор Gateway
    guards:
      - Платёж не прошёл или отклонён Gateway.

# ── §4. Документы и подписи ─────────────────────────────────────────────────
# Для внесения взноса документ не оформляется — факт внесения
# подтверждается самим платежом через Gateway.
documents: []

# ── §5. Операции ────────────────────────────────────────────────────────────
# Одноактовый процесс: одна запись ACTION_REGISTRY с process_type=wall.deposit.
operations:
  - ledger_code: wall.depcpl
    human_name: Внесение пайщиком паевого взноса
    wallet_op: ISSUE
    wallet_from: null
    wallet_to: 2001          # ЦПП «Цифровой Кошелёк» — паевые взносы деньгами
    debit: 51                # Расчётный счёт
    credit: 80               # Паевой фонд (складочный капитал)
    amount_ref: deposit.quantity
    triggered_by: wallet::completedpst
    description: >
      Первичный вход средств на кошелёк пайщика «ЦПП Цифровой Кошелёк».
      Двойная запись Дт 51 / Кт 80 — деньги пайщика поступили на
      расчётный счёт и увеличили складочный капитал кооператива.
      Средства доступны пайщику для дальнейших операций (инвестиции
      в программы, конвертации, возврат).

# ── §6. Связи ───────────────────────────────────────────────────────────────
related:
  - process_type: reg.regist
    relation: provides
    note: >
      Пайщик должен пройти штатную регистрацию (reg.regist) и получить
      статус `active`, прежде чем сможет вносить дополнительные паевые
      взносы.

  - process_type: wall.withdrw
    relation: affects
    note: >
      Обратный процесс — возврат паевого взноса пайщику (wall.withdrw).
      Средства списываются с того же кошелька SHARE_FUND_PAY, который
      пополняется в этом процессе.

  - process_type: cap.invest
    relation: triggers
    note: >
      Средства на кошельке SHARE_FUND_PAY могут быть направлены в
      инвестиционные программы (например, в «Благорост» через
      cap.invest) — это отдельный процесс, использующий уже внесённые
      паевые средства.
