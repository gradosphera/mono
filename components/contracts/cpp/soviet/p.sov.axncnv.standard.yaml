# ─────────────────────────────────────────────────────────────────────────────
# Стандарт «Конвертация паевого в делегатский ЧВ» — пайщик переводит часть
# своего паевого взноса в членский взнос инфраструктуры (Кооперативной
# Экономики). Курс конвертации фиксированный: 10 RUB паевого = 1 AXON.
#
# Одноактовый процесс. В ledger2 — одна операция o.sov.axncnv: TRANSFER с
# SHARE_FUND_PAY (2001) на DELEGATE_FEES (3003), проводка Дт 80 / Кт 86 —
# средства уходят из паевого фонда в целевое финансирование инфраструктуры.
#
# Источники правды в коде:
#   • cpp/soviet/soviet.hpp                                         — actions
#   • cpp/soviet/src/converttoaxn.cpp                               — реализация
#   • cpp/lib/core/ledger2/operations.hpp                           — o.sov.axncnv
#   • cpp/lib/core/ledger2/processes.hpp                            — processes::soviet::AXN_CONVERT
#   • cooptypes/cooperative/registry/51.ConvertToAxonStatement      — заявление пайщика
# ─────────────────────────────────────────────────────────────────────────────

# ── Секция 1. Паспорт ───────────────────────────────────────────────────────
process_type: p.sov.axncnv
id: public_soviet_axn_convert_process
title: Конвертация паевого в делегатский ЧВ
slug: convert-axn
status: proposed
contract: soviet
summary: >
  Пайщик переводит часть своего паевого взноса деньгами в членский взнос
  инфраструктуры платформы Кооперативной Экономики по фиксированному курсу
  10 RUB = 1 AXON.
purpose: >
  Одноактовый документационный процесс. Пайщик подписывает заявление о
  конвертации (ConvertToAxonStatement, registry_id 51), указывая сумму в
  рублях, и вызывает converttoaxn. Контракт делает в ledger2 одну операцию
  o.sov.axncnv (TRANSFER 2001 → 3003, Дт 80 / Кт 86) — паевой фонд
  уменьшается, средства уходят в целевое финансирование как делегатский
  членский взнос инфраструктуры.
roles:
  - contributor

# ── Секция 2. Действия контракта ────────────────────────────────────────────
actions:
  - name: soviet::converttoaxn
    human: Конвертировать в AXN
    actor: contributor
    role: closer
    purpose: >
      Закрывающее одношаговое действие: пайщик подписывает заявление и
      инициирует конвертацию. Контракт проверяет документ, валидирует
      сумму (символ RUB), применяет ledger2-операцию o.sov.axncnv —
      сумма уходит с SHARE_FUND_PAY на DELEGATE_FEES.

# ── Секция 3. Граф состояний ────────────────────────────────────────────────
entity: soviet::axn_convert
entity_human: Заявление о конвертации в AXN
entity_source: cpp/soviet/src/converttoaxn.cpp

states:
  - name: converted
    human: Конвертировано
    description: >
      Заявление обработано: сумма переведена с SHARE_FUND_PAY (2001) на
      DELEGATE_FEES (3003) с проводкой Дт 80 / Кт 86. Документ зафиксирован
      в реестре.
    kind: final

transitions:
  - from: "∅"
    to: converted
    action: soviet::converttoaxn
    actor: contributor
    ledger_code: o.sov.axncnv
    operations:
      - o.sov.axncnv
    guards:
      - Пайщик активен.
      - Сумма > 0, символ = RUB (root govern symbol).
      - AXN-эквивалент > 0 (сумма ≥ 10 RUB).
      - Заявление подписано ЭЦП пайщика.

# ── Секция 4. Сценарий ──────────────────────────────────────────────────────
scenario:
  steps:
    - step: 1
      title: Подача заявления о конвертации
      actor: contributor
      action: soviet::converttoaxn
      description: >
        Пайщик подписывает заявление ConvertToAxonStatement (registry_id 51),
        указывая сумму в RUB (например «1500.00 RUB»). Контракт проверяет
        документ через verify_document_or_fail, валидирует сумму, и
        применяет операцию o.sov.axncnv: 1500 RUB → 150 AXN, проводка
        Дт 80 / Кт 86. Документ фиксируется в реестре через
        Soviet::make_complete_document.
      pre:
        - Пайщик активен в кооперативе.
        - Достаточный остаток на SHARE_FUND_PAY.
        - Сумма кратна 10 (для целочисленного AXN-эквивалента).
      post:
        - Сумма переведена 2001 → 3003.
        - В ledger2 применена операция o.sov.axncnv.
        - Заявление зафиксировано в реестре.

  alternatives: []

# ── Секция 5. Документы и подписи ───────────────────────────────────────────
documents:
  - step: 1
    title: Заявление о конвертации паевого взноса в членский взнос инфраструктуры
    template: ConvertToAxonStatement
    registry_id: 51
    signed_by: [contributor]
    stored_in: "(параметр действия + реестр документов)"
    note: >
      Содержит convert_amount (сумма в RUB). Контракт проверяет соответствие
      переданной суммы значению в документе.

# ── Секция 6. Операции ──────────────────────────────────────────────────────
operations:
  - ledger_code: o.sov.axncnv
    human_name: Трансляция паевого в членский взнос инфраструктуры
    wallet_op: TRANSFER
    wallet_from: 2001          # ЦПП «Цифровой Кошелёк» — паевые взносы деньгами
    wallet_to: 3003            # Делегатские членские взносы
    debit: 80                  # Паевой фонд (складочный капитал)
    credit: 86                 # Целевое финансирование
    amount_ref: statement.convert_amount
    triggered_by: soviet::converttoaxn
    description: >
      Перевод суммы с паевого кошелька пайщика в кошелёк делегатских
      членских взносов инфраструктуры. Двойная запись Дт 80 / Кт 86 —
      паевой фонд уменьшается, целевое финансирование увеличивается на
      сумму конвертированного взноса. Курс 10:1 (10 RUB паевого = 1 AXON).

# ── Секция 7. Связи ─────────────────────────────────────────────────────────
related:
  - process_type: p.wal.depo
    id: public_wallet_deposit_process
    relation: provides
    note: >
      Чтобы конвертировать, у пайщика должен быть остаток на SHARE_FUND_PAY —
      его создаёт «Внесение паевого взноса» (p.wal.depo).

  - process_type: p.reg.accept
    id: public_registrator_accept_process
    relation: provides
    note: >
      Конвертацию может выполнить только активный пайщик кооператива.
