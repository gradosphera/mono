# ─────────────────────────────────────────────────────────────────────────────
# Стандарт «Регистрация пайщика» — штатная процедура приёма в кооператив.
#
# Трёхактный процесс: кандидат подаёт заявление → оплачивает взносы
# (через контракт Gateway) → совет принимает решение. На закрывающем
# действии confirmreg одновременно применяются две операции переводов
# и проводок (reg.entrfee и reg.minshare), аккаунт получает статус active.
#
# Источники правды в коде:
#   • cpp/registrator/registrator.hpp                   — actions
#   • cpp/registrator/src/user/{reguser,confirmpay,
#     confirmreg,declinepay,declinereg}.cpp
# ─────────────────────────────────────────────────────────────────────────────

# ── §1. Паспорт ─────────────────────────────────────────────────────────────
process_type: reg.regist
title: Регистрация пайщика
slug: regist
status: proposed
contract: registrator
summary: >
  Приём нового пайщика в кооператив: от подачи заявления до присвоения
  статуса «активный пайщик» и постановки вступительного и минимального
  паевого взносов на учёт.
purpose: >
  Процесс оформляет вход человека или организации в кооператив: кандидат
  подписывает заявление, оплачивает вступительный и минимальный паевой
  взнос через контракт Gateway, совет принимает решение. На этапе
  утверждения совета в контракте книги учёта Ledger2 одновременно
  возникают две операции — reg.entrfee и reg.minshare — и пайщик
  получает статус `active`.

# ── §2. Действия контракта ──────────────────────────────────────────────────
actions:
  - name: registrator::reguser
    human: Подать заявление
    actor: Кандидат
    purpose: >
      Будущий пайщик оформляет и подписывает заявление о вступлении
      своей ЭЦП в документе. Приложение кооператива вызывает reguser
      (от имени coopname), контракт создаёт запись кандидата со статусом
      `created`, отправляет совету повестку типа «joincoop» (о приёме
      нового пайщика) и выпускает в контракте Gateway счёт на сумму
      «вступительный + минимальный паевой взнос».
  - name: registrator::confirmpay
    human: Подтвердить оплату
    actor: Кассир
    purpose: >
      Кассир, обслуживающий входящий платёж, подтверждает, что
      вступительный и минимальный паевой взнос получены на расчётный
      счёт кооператива. Переводит кандидата в статус `payed`. Само
      подтверждение оплаты управляется отдельным стандартом в контракте
      Gateway — здесь фиксируется только callback «оплата подтверждена».
    links:
      - process_type: gate.inpay
        label: Обработка входящего платежа (Gateway)
  - name: registrator::declinepay
    human: Отклонить оплату
    actor: Кассир
    purpose: >
      Кассир отклоняет платёж (неверные реквизиты, возврат, технический
      сбой платёжной системы). Запись кандидата удаляется. Как и
      подтверждение, само отклонение оформляется отдельным стандартом
      в контракте Gateway — сюда приходит callback «оплата отклонена».
    links:
      - process_type: gate.inpay
        label: Обработка входящего платежа (Gateway)
  - name: registrator::confirmreg
    human: Утвердить советом
    actor: Совет
    purpose: >
      Закрывающее действие: совет принимает положительное решение по
      повестке о приёме пайщика. В контракте книги учёта Ledger2
      применяются операции reg.entrfee и reg.minshare (переводы по
      кошелькам и бухгалтерские проводки), аккаунт получает статус
      `active`, кандидат добавляется в список участников кооператива,
      запись кандидата удаляется.
    links:
      - process_type: sov.decision
        label: Принятие решения советом
  - name: registrator::declinereg
    human: Отклонить советом
    actor: Совет
    purpose: >
      Совет отказывает в приёме пайщика. Запись кандидата удаляется,
      операции переводов и проводок в Ledger2 не создаются, платёж
      подлежит возврату отдельным процессом.
    links:
      - process_type: sov.decision
        label: Принятие решения советом

# ── §3. Граф состояний ──────────────────────────────────────────────────────
# Составная сущность: статус кандидата отслеживается в таблице `candidates`
# (created / payed), финальный `active` проставляется в таблице `accounts`
# на действии confirmreg. Для графа процесса показываем единый жизненный цикл.
entity: "registrator::candidate → registrator::account"
entity_human: "Кандидат → пайщик"

states:
  - name: created
    human: Заявление подано
    description: >
      Кандидат создан, в контракте Gateway выпущен счёт на сумму
      «вступительный + минимальный паевой взнос», совет получил
      повестку типа «joincoop» — о приёме нового пайщика.
    kind: normal

  - name: payed
    human: Взнос оплачен
    description: >
      Контракт Gateway подтвердил зачисление вступительного и
      минимального паевого взноса на расчётный счёт кооператива.
      Совет готов рассмотреть повестку о приёме.
    kind: normal

  - name: active
    human: Пайщик активен
    description: >
      Минимальный паевой взнос оприходован на кошельке пайщика
      «Минимальный паевой взнос» (id 2002), вступительный — на кошельке
      кооператива «Вступительные взносы» (id 3001). В бухгалтерии
      прошли проводки Дт 51 / Кт 80 (паевой фонд) и Дт 51 / Кт 86
      (целевое финансирование). С этого момента пайщик может пополнять
      паевой взнос (wall.deposit), возвращать его (wall.withdrw)
      и участвовать в программах кооператива.
    kind: final

  - name: removed
    human: Отклонено
    description: >
      Процесс прерван: отказ на этапе оплаты (платёж не прошёл) или
      на этапе совета (отрицательное решение). Запись кандидата удалена,
      операции переводов и проводок не создавались, уплаченные средства
      возвращаются пайщику отдельным процессом.
    kind: virtual

transitions:
  - from: "∅"
    to: created
    action: registrator::reguser
    actor: Кандидат
    guards:
      - Участник не состоит в кооперативе и не имеет активной карточки.
      - Тип пайщика ∈ {individual, entrepreneur, organization}.
      - Заявление подписано ЭЦП.

  - from: created
    to: payed
    action: registrator::confirmpay
    actor: Кассир
    guards:
      - Контракт Gateway подтвердил зачисление суммы = initial + minimum
        на расчётный счёт кооператива.

  - from: created
    to: removed
    action: registrator::declinepay
    actor: Кассир
    guards:
      - Платёж не поступил или отклонён контрактом Gateway.

  - from: payed
    to: active
    action: registrator::confirmreg
    actor: Совет
    guards:
      - Совет принял положительное решение по повестке типа «joincoop».
      - Документ authorization подписан председателем совета.

  - from: payed
    to: removed
    action: registrator::declinereg
    actor: Совет
    guards:
      - Совет принял отрицательное решение по повестке.

# ── §4. Документы и подписи ─────────────────────────────────────────────────
documents:
  - action: registrator::reguser
    title: Заявление на вступление в кооператив
    registry_id: 100                 # cooptypes: 100.ParticipantApplication
    signed_by: [ Кандидат ]
    stored_in: candidates.statement

  - action: registrator::confirmreg
    title: Протокол решения совета о приёме пайщика
    registry_id: 501                 # cooptypes: 501.DecisionOfParticipantApplication
    signed_by: [ Председатель совета ]
    stored_in: "authorization — в параметре действия, не хранится в candidates после удаления записи"

# ── §5. Операции ────────────────────────────────────────────────────────────
# Мульти-операционный процесс: две записи ACTION_REGISTRY с process_type
# reg.regist. Обе срабатывают на закрывающем действии confirmreg.
operations:
  - ledger_code: reg.entrfee
    human_name: Вступительный взнос пайщика
    wallet_op: ISSUE
    wallet_from: null
    wallet_to: 3001          # Вступительные взносы
    debit: 51                # Расчётный счёт
    credit: 86               # Целевое финансирование
    amount_ref: candidate.initial
    triggered_by: registrator::confirmreg
    description: >
      Первичный вход вступительного взноса на кошелёк кооператива
      «Вступительные взносы». Двойная запись Дт 51 / Кт 86 — средства
      поступили на расчётный счёт и квалифицируются как целевые
      поступления в кооперативный фонд.

  - ledger_code: reg.minshare
    human_name: Минимальный паевой взнос при регистрации
    wallet_op: ISSUE
    wallet_from: null
    wallet_to: 2002          # Минимальный паевой взнос
    debit: 51                # Расчётный счёт
    credit: 80               # Паевой фонд (складочный капитал)
    amount_ref: candidate.minimum
    triggered_by: registrator::confirmreg
    description: >
      Первичный вход минимального паевого взноса на кошелёк пайщика
      «Минимальный паевой взнос». Двойная запись Дт 51 / Кт 80 —
      средства поступили на расчётный счёт и формируют складочный
      капитал кооператива.

# ── §6. Связи ───────────────────────────────────────────────────────────────
related:
  - process_type: reg.adduser
    relation: affects
    note: >
      Альтернативный (обходной) путь входа — ручное добавление пайщика
      председателем (reg.adduser). Применяется для исторических пайщиков,
      принятых вне цифровой системы.

  - process_type: reg.recovery
    relation: triggers
    note: >
      После получения статуса `active` пайщик входит в свой аккаунт;
      в случае утери ключа запускается отдельный сценарий восстановления
      (reg.recovery).

  - process_type: wall.deposit
    relation: triggers
    note: >
      После получения статуса `active` пайщик может вносить дополнительные
      паевые взносы через процесс «Внесение паевого взноса» (wall.deposit).

  - process_type: wall.withdrw
    relation: affects
    note: >
      Выход из кооператива оформляется обратным процессом «Возврат
      паевого взноса» (wall.withdrw) — он возвращает средства с того же
      складочного капитала.
