# ─────────────────────────────────────────────────────────────────────────────
# Стандарт «Восстановление ключа доступа» — замена активного ключа пайщика.
#
# Единый сценарий для двух пользовательских ситуаций:
#   • «Забыл ключ» — активный пайщик утратил свой приватный ключ.
#   • «Приглашение» — новоприбавленный пайщик (через reg.adduser) получает
#     первую ссылку на установку ключа.
#
# В обеих ситуациях on-chain действие одно и то же — registrator::changekey.
# Разница в офф-чейне: отличается источник инициации (самообращение пайщика
# или автоматическое приглашение после adduser) и содержимое e-mail.
#
# Документов не подписывается: гарантия — сам факт подписи нового ключа
# бэкендом кооператива под действием changekey.
#
# Источники правды в коде:
#   • cpp/registrator/registrator.hpp                  — action changekey
#   • cpp/registrator/src/account/changekey.cpp        — реализация
# ─────────────────────────────────────────────────────────────────────────────

# ── §1. Паспорт ─────────────────────────────────────────────────────────────
process_type: reg.recovery
title: Восстановление ключа доступа
slug: recovery
status: proposed
contract: registrator
summary: >
  Пайщик получает новый активный ключ для входа в аккаунт. Один и тот
  же on-chain сценарий обслуживает два случая: восстановление после
  утери ключа и первичное приглашение после ручного добавления.
purpose: >
  On-chain у сценария ровно одно действие — registrator::changekey,
  которое заменяет активный ключ пайщика. Off-chain подготовку делает
  бэкенд кооператива: отправляет письмо со ссылкой, принимает от
  пайщика новый публичный ключ и вызывает действие от имени coopname.
  Документооборот и учётные операции здесь не возникают — гарантией
  является сама цифровая подпись под действием.

# ── §2. Действия контракта ──────────────────────────────────────────────────
actions:
  - name: registrator::changekey
    human: Заменить ключ
    actor: Кооператив
    purpose: >
      Единственное on-chain действие сценария. Кооператив (через свой
      бэкенд, подпись coopname) передаёт новый публичный ключ, контракт
      проверяет, что пайщик активен и кооператив активен, и заменяет
      active-authority аккаунта пайщика на новый ключ. Старый ключ
      теряет силу немедленно.

# ── §3. Граф состояний ──────────────────────────────────────────────────────
# Сценарий не меняет статус пайщика в таблицах — он заменяет
# криптографический материал аккаунта. Для графа процесса показываем
# минимальный жизненный цикл: пустое состояние → «Ключ обновлён».
entity: registrator::account
entity_human: Аккаунт пайщика

states:
  - name: renewed
    human: Ключ обновлён
    description: >
      Active-authority аккаунта пайщика заменён на новый публичный ключ.
      Пайщик может входить в приложение кооператива под новым ключом;
      доступ по старому ключу прекращён.
    kind: final

transitions:
  - from: "∅"
    to: renewed
    action: registrator::changekey
    actor: Кооператив
    guards:
      - Кооператив активен (status = active).
      - Пайщик активен в кооперативе (participant.status = accepted).
      - У аккаунта `changer` есть право «changekey» в кооперативе.

# ── §4. Документы и подписи ─────────────────────────────────────────────────
# Документов не оформляется. Цифровая подпись нового ключа под действием
# changekey — самодостаточное доказательство владения.
documents: []

# ── §5. Операции ────────────────────────────────────────────────────────────
# Учётные операции не выполняются: сценарий не связан с движением
# средств или изменением состава участников.
operations: []

# ── §6. Связи ───────────────────────────────────────────────────────────────
related:
  - process_type: reg.adduser
    relation: provides
    note: >
      После ручного добавления пайщика (reg.adduser) приглашение на
      установку ключа отправляется автоматически — off-chain часть
      этого сценария.

  - process_type: reg.regist
    relation: affects
    note: >
      Пайщик, прошедший штатную регистрацию (reg.regist), может
      использовать этот сценарий для восстановления утраченного ключа.
