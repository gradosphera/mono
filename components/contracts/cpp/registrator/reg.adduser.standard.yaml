# ─────────────────────────────────────────────────────────────────────────────
# Стандарт «Приглашение пайщика» — ввод в цифровой кооператив ранее
# принятого пайщика.
#
# Сценарий применяется, когда пайщик уже был принят в кооператив по
# бумажному заявлению (вне цифровой системы), и теперь нужно оформить
# ему ЭЦП и подключить к цифровому кооперативу. Председатель добавляет
# аккаунт; пайщику автоматически уходит приглашение получить ключ через
# сценарий «Восстановление ключа доступа» (reg.recovery).
#
# Даже при таком «историческом» вводе учётные проводки выполняются:
# минимальный паевой взнос ставится на учёт всегда, вступительный —
# опционально (по флагу `spread_initial`).
#
# Источники правды в коде:
#   • cpp/registrator/registrator.hpp                  — action adduser
#   • cpp/registrator/src/user/adduser.cpp             — реализация
# ─────────────────────────────────────────────────────────────────────────────

# ── §1. Паспорт ─────────────────────────────────────────────────────────────
process_type: reg.adduser
title: Приглашение пайщика
slug: adduser
status: proposed
contract: registrator
summary: >
  Приглашение в цифровой кооператив ранее принятого пайщика: председатель
  добавляет аккаунт человеку, который уже вступил в кооператив по бумажному
  заявлению, и высылает ему ссылку на установку ЭЦП.
purpose: >
  Процесс нужен для ввода в цифровой кооператив пайщиков, принятых ранее
  по бумажным заявлениям (вне цифровой системы). Председатель добавляет
  аккаунт, указывает исторические суммы вступительного и минимального
  паевого взноса; аккаунт сразу получает статус `active`. Параллельно
  пайщику отправляется приглашение установить ЭЦП и подключиться к
  цифровому кооперативу — дальше приглашение отрабатывает сценарий
  «Восстановление ключа доступа» (reg.recovery). В учёте одновременно
  проходят операции `reg.minshare` (минимальный паевой взнос) и,
  опционально, `reg.entrfee` (вступительный взнос).

# ── §2. Действия контракта ──────────────────────────────────────────────────
actions:
  - name: registrator::adduser
    human: Пригласить пайщика
    actor: Председатель
    purpose: >
      Одно действие, закрывающее весь сценарий. Председатель указывает
      тип пайщика (individual / entrepreneur / organization), историческую
      дату вступления (в прошлом), суммы вступительного и минимального
      паевого взноса, а также флаг `spread_initial` — ставить ли
      вступительный взнос на учёт в Ledger2. Контракт создаёт системный
      аккаунт через eosio::createaccnt, заводит карточку участника со
      статусом `active`, применяет учётные операции и увеличивает
      счётчик активных пайщиков. Ссылка-приглашение на установку ЭЦП
      отправляется пайщику бэкендом кооператива за пределами этого
      стандарта.

# ── §3. Граф состояний ──────────────────────────────────────────────────────
entity: registrator::account
entity_human: Пайщик

states:
  - name: active
    human: Пайщик активен
    description: >
      Аккаунт исторического пайщика создан, взнос оприходован (минимальный
      на кошельке пайщика id 2002; вступительный на кошельке кооператива
      id 3001 — если `spread_initial=true`). Пайщику отправлено приглашение
      получить ЭЦП — до её установки он числится активным, но войти в
      приложение не может. Установка ключа идёт в отдельном сценарии
      reg.recovery.
    kind: final

transitions:
  - from: "∅"
    to: active
    action: registrator::adduser
    actor: Председатель
    guards:
      - Аккаунта с таким username ещё нет в картотеке.
      - Тип пайщика ∈ {individual, entrepreneur, organization}.
      - Дата вступления (created_at) — в прошлом.
      - Суммы initial и minimum — в системном символе кооператива.

# ── §4. Документы и подписи ─────────────────────────────────────────────────
# Заявление в этом сценарии не подписывается: бумажное заявление уже было
# оформлено при приёме пайщика в кооператив вне цифровой системы; факт
# исторического приёма удостоверяется подписью председателя под adduser.
documents: []

# ── §5. Операции ────────────────────────────────────────────────────────────
# Одна операция всегда (минимальный паевой взнос), вторая — по флагу
# `spread_initial`. В обоих случаях источник средств — «Выпуск»:
# деньги были получены кооперативом исторически, в цифровой системе
# фиксируются «задним числом».
operations:
  - ledger_code: reg.minshare
    human_name: Минимальный паевой взнос при регистрации
    wallet_op: ISSUE
    wallet_from: null
    wallet_to: 2002          # Минимальный паевой взнос
    debit: 51                # Расчётный счёт
    credit: 80               # Паевой фонд (складочный капитал)
    amount_ref: action.minimum
    triggered_by: registrator::adduser
    description: >
      Та же операция, что в штатной регистрации (reg.regist), но
      триггерится из приглашения пайщика: минимальный паевой взнос
      «задним числом» оприходован на расчётный счёт (Дт 51) и формирует
      складочный капитал кооператива (Кт 80). На кошельке пайщика
      «Минимальный паевой взнос» образуется остаток в размере minimum.

  - ledger_code: reg.entrfee
    human_name: Вступительный взнос пайщика
    wallet_op: ISSUE
    wallet_from: null
    wallet_to: 3001          # Вступительные взносы
    debit: 51                # Расчётный счёт
    credit: 86               # Целевое финансирование
    amount_ref: action.initial
    triggered_by: registrator::adduser
    description: >
      Та же операция, что в штатной регистрации, но триггерится из
      приглашения и только при `spread_initial=true` — председатель
      явно указал, что вступительный взнос был получен исторически.
      Иначе операция не создаётся (взнос уже был поставлен на учёт
      другими средствами).

# ── §6. Связи ───────────────────────────────────────────────────────────────
related:
  - process_type: reg.recovery
    relation: triggers
    note: >
      Сразу после приглашения кооператив отправляет пайщику ссылку на
      установку ЭЦП. Сама установка ключа и подключение к цифровому
      кооперативу идут в сценарии «Восстановление ключа доступа»
      (reg.recovery).

  - process_type: reg.regist
    relation: affects
    note: >
      Штатный путь — полная цифровая регистрация с заявлением, оплатой
      и голосованием совета (reg.regist). Приглашение пайщика применяется
      только для вновь подключаемых исторических пайщиков, которые были
      приняты в кооператив по бумажному заявлению до цифровизации.
