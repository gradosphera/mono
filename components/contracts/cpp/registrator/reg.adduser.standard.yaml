# ─────────────────────────────────────────────────────────────────────────────
# Стандарт «Добавление пайщика вручную» — обход стандартной процедуры приёма.
#
# Председатель вручную добавляет аккаунт человеку, который уже является
# пайщиком кооператива вне цифровой системы (исторический / унаследованный
# реестр). Заявление не подписывается, оплата не принимается, совет не
# голосует — факт членства подтверждает сам председатель своей подписью
# под действием.
#
# Одновременно с добавлением запускается параллельный сценарий
# «Восстановление ключа доступа» (reg.recovery) — пайщик получает
# приглашение на e-mail со ссылкой на установку ключа.
#
# Даже при ручном добавлении учётные проводки выполняются: минимальный
# паевой взнос ставится на учёт всегда, вступительный — опционально
# (по флагу `spread_initial`).
#
# Источники правды в коде:
#   • cpp/registrator/registrator.hpp                  — action adduser
#   • cpp/registrator/src/user/adduser.cpp             — реализация
# ─────────────────────────────────────────────────────────────────────────────

# ── §1. Паспорт ─────────────────────────────────────────────────────────────
process_type: reg.adduser
title: Добавление пайщика вручную
slug: adduser
status: proposed
contract: registrator
summary: >
  Председатель добавляет аккаунт человеку, который уже является пайщиком
  кооператива вне цифровой системы. Заявление не оформляется, взнос не
  оплачивается — факт членства удостоверяет сам председатель.
purpose: >
  Процесс нужен для ввода в цифровую систему участников, вступивших в
  кооператив до цифровизации (исторические реквизиты) или принятых по
  отдельной процедуре (например, заочное голосование общего собрания).
  Аккаунт сразу получает статус `active`, запускается параллельный
  сценарий установки ключа (reg.recovery) через e-mail-приглашение,
  в учёте одновременно проходят операции `reg.addmin` (минимальный
  паевой взнос) и, опционально, `reg.addfee` (вступительный взнос).

# ── §2. Действия контракта ──────────────────────────────────────────────────
actions:
  - name: registrator::adduser
    human: Добавить пайщика
    actor: Председатель
    purpose: >
      Одно действие, закрывающее весь сценарий. Председатель указывает
      тип пайщика (individual / entrepreneur / organization), дату
      вступления (в прошлом), суммы вступительного и минимального
      паевого взноса, а также флаг `spread_initial` — ставить ли
      вступительный взнос на учёт. Контракт создаёт системный аккаунт
      через eosio::createaccnt, заводит карточку участника со статусом
      `active`, применяет учётные операции и увеличивает счётчик
      активных пайщиков в кооперативе.

# ── §3. Граф состояний ──────────────────────────────────────────────────────
entity: registrator::account
entity_human: Пайщик

states:
  - name: active
    human: Пайщик активен
    description: >
      Пайщик добавлен в кооператив, аккаунт активен, взнос на учёте.
      Параллельно запущен сценарий установки ключа — пайщик получает
      приглашение на e-mail и завершает вход через reg.recovery.
    kind: final

transitions:
  - from: "∅"
    to: active
    action: registrator::adduser
    actor: Председатель
    guards:
      - Аккаунта с таким username ещё нет в картотеке.
      - Тип пайщика ∈ {individual, entrepreneur, organization}.
      - Дата вступления (created_at) — в прошлом.
      - Суммы initial и minimum — в системном символе кооператива.

# ── §4. Документы и подписи ─────────────────────────────────────────────────
# При ручном добавлении заявление пайщик не подписывает — факт приёма
# удостоверяется подписью председателя под самим действием adduser.
documents: []

# ── §5. Операции ────────────────────────────────────────────────────────────
# Одна операция всегда (минимальный паевой взнос), вторая — по флагу
# `spread_initial` параметра действия. В обоих случаях источник средств —
# «Выпуск» (исторический вход, деньги уже были получены кооперативом
# до цифровой фиксации).
operations:
  - ledger_code: reg.minshare
    human_name: Минимальный паевой взнос при регистрации
    wallet_op: ISSUE
    wallet_from: null
    wallet_to: 2002          # Минимальный паевой взнос
    debit: 51                # Расчётный счёт
    credit: 80               # Паевой фонд (складочный капитал)
    amount_ref: action.minimum
    triggered_by: registrator::adduser
    description: >
      Та же операция, что и в штатной регистрации (reg.regist), но
      триггерится из ручного добавления: минимальный паевой взнос
      «задним числом» оприходован на расчётный счёт (Дт 51) и формирует
      складочный капитал кооператива (Кт 80). На кошельке «Минимальный
      паевой взнос» пайщика образуется остаток в размере minimum.

  - ledger_code: reg.entrfee
    human_name: Вступительный взнос пайщика
    wallet_op: ISSUE
    wallet_from: null
    wallet_to: 3001          # Вступительные взносы
    debit: 51                # Расчётный счёт
    credit: 86               # Целевое финансирование
    amount_ref: action.initial
    triggered_by: registrator::adduser
    description: >
      Та же операция, что и в штатной регистрации, но триггерится из
      ручного добавления и только при `spread_initial=true` — председатель
      явно указал, что вступительный взнос был получен. Иначе операция
      не создаётся (у исторического пайщика взнос уже был поставлен на
      учёт другими средствами).

# ── §6. Связи ───────────────────────────────────────────────────────────────
related:
  - process_type: reg.recovery
    relation: triggers
    note: >
      Сразу после добавления кооператив отправляет пайщику приглашение
      с ссылкой на установку ключа доступа. Фактическая установка ключа
      проходит в сценарии «Восстановление ключа доступа» (reg.recovery).

  - process_type: reg.regist
    relation: affects
    note: >
      Альтернативный (штатный) путь входа — полная процедура регистрации
      с заявлением, оплатой и голосованием совета. «Добавление вручную»
      применяется как обход, когда штатная процедура неприменима
      (исторические пайщики, заочное решение собрания).
