# ─────────────────────────────────────────────────────────────────────────────
# Стандарт «Приём пайщика» — кооперативный процесс приёма в кооператив.
#
# Это пилотный манифест v1: описывает процесс в целевом виде, где учётные
# проводки делаются через ledger2 (o.reg.payent + o.reg.putmin).
#
# Канон формата:
#   coopenomics-docs/docs/standards/_spec/canon.md
# Источники правды в коде:
#   • cpp/registrator/registrator.hpp                 — actions
#   • cpp/registrator/src/user/{reguser,confirmpay,confirmreg,declinepay,declinereg}.cpp
#   • cpp/lib/core/ledger2/operations.hpp             — OPERATION_REGISTRY (o.reg.payent, o.reg.putmin)
#   • cpp/lib/core/ledger2/processes.hpp              — processes::registrator::ACCEPT
#   • cpp/lib/core/ledger2/wallets.hpp                — ENTRANCE_FEES, MIN_SHARE_FUND
#   • cpp/lib/core/ledger2/accounts.hpp               — BANK_ACCOUNT, SHARE_FUND, TARGET_RECEIPTS
# ─────────────────────────────────────────────────────────────────────────────

# ── Секция 1. Паспорт ───────────────────────────────────────────────────────
process_type: p.reg.accept
id: public_registrator_accept_process
title: Приём пайщика
slug: accept
status: proposed
contract: registrator
summary: >
  Приём нового пайщика в кооператив: от подачи заявления до присвоения статуса
  «активный пайщик» и постановки вступительного и минимального паевого взносов
  на учёт.
purpose: >
  Процесс оформляет вход человека (или организации) в кооператив: пайщик
  подписывает заявление, оплачивает вступительный взнос и минимальный паевой
  взнос, совет принимает решение. На этапе подтверждения совета в учёте
  одновременно возникают две ledger2-операции — o.reg.payent и o.reg.putmin —
  и пайщик получает статус `active`.
roles:
  - contributor        # будущий пайщик
  - chairman           # председатель / администратор (запускает reguser от имени coopname)
  - gateway_operator   # оператор входящих платежей
  - soviet             # совет кооператива

# ── Секция 2. Действия контракта (блокчейн-уровень) ─────────────────────────
actions:
  - name: registrator::reguser
    human: Подать заявление
    actor: contributor
    role: opener
    purpose: >
      Подать заявление на вступление. Технически подписывается ключом
      `coopname` — приложение кооператива инициирует действие от имени
      человека, который подписал заявление своей ЭЦП в документе.
  - name: registrator::confirmpay
    human: Подтвердить оплату
    actor: gateway_operator
    role: progress
    purpose: Подтвердить, что вступительный + минимальный паевой взнос получены.
  - name: registrator::declinepay
    human: Отклонить оплату
    actor: gateway_operator
    role: reject
    purpose: Отклонить платёж (неверные реквизиты, возврат, технический сбой).
  - name: registrator::confirmreg
    human: Утвердить советом
    actor: soviet
    role: closer
    purpose: >
      Совет утверждает приём пайщика. Это закрывающее действие: после него
      в ledger2 применяются операции o.reg.payent и o.reg.putmin, аккаунт
      получает статус `active`, кандидат удаляется.
  - name: registrator::declinereg
    human: Отклонить советом
    actor: soviet
    role: reject
    purpose: Совет отказывает в приёме. Запись кандидата удаляется, платёж возвращается.

# ── Секция 3. Граф состояний ────────────────────────────────────────────────
# Составная сущность: статус отслеживается в таблице `candidates` (created / payed),
# финальный `active` проставляется в таблице `accounts` в действии confirmreg.
# Для BPMN-графа мы показываем единый жизненный цикл процесса.
entity: "registrator::candidate → registrator::account"
entity_human: "Кандидат → пайщик"
entity_source: cpp/registrator/src/user/

states:
  - name: created
    human: Заявление подано
    description: Заявление подано, кандидат создан, в gateway выпущен счёт на оплату.
    kind: normal
  - name: payed
    human: Взнос оплачен
    description: Gateway подтвердил получение вступительного и минимального паевого взноса.
    kind: normal
  - name: active
    human: Пайщик активен
    description: Совет утвердил приём. Пайщик — активный член кооператива, взносы поставлены на учёт.
    kind: final
  - name: removed
    human: Отклонено
    description: Процесс прерван (отказ на этапе оплаты или на этапе совета); кандидат удалён.
    kind: virtual
    virtual: true

transitions:
  - from: "∅"
    to: created
    action: registrator::reguser
    actor: contributor
    guards:
      - Участник не состоит в кооперативе и не имеет активной карточки участника.
      - Тип пользователя ∈ {individual, entrepreneur, organization}.
      - Заявление подписано ЭЦП.

  - from: created
    to: payed
    action: registrator::confirmpay
    actor: gateway_operator
    guards:
      - Gateway подтвердил зачисление суммы = initial + minimum.

  - from: created
    to: removed
    action: registrator::declinepay
    actor: gateway_operator
    guards:
      - Оплата не поступила / отклонена.

  - from: payed
    to: active
    action: registrator::confirmreg
    actor: soviet
    ledger_code: p.reg.accept
    operations:
      - o.reg.payent
      - o.reg.putmin
    guards:
      - Совет принял положительное решение по повестке.

  - from: payed
    to: removed
    action: registrator::declinereg
    actor: soviet
    guards:
      - Совет принял отрицательное решение по повестке.

# ── Секция 4. Сценарий ──────────────────────────────────────────────────────
scenario:
  steps:
    - step: 1
      title: Подача заявления
      actor: contributor
      action: registrator::reguser
      description: >
        Будущий пайщик оформляет и подписывает заявление о вступлении в
        кооператив. Приложение кооператива вызывает registrator::reguser
        (с подписью coopname), указывая тип пользователя (individual /
        entrepreneur / organization) и территориальный участок (braname).
        Контракт создаёт запись кандидата со статусом `created` и выпускает
        в Gateway счёт на сумму «вступительный + минимальный паевой взнос».
      pre:
        - Участник ещё не имеет карточки в картотеке и не состоит в кооперативе.
        - Тип пользователя валиден.
      post:
        - В таблице candidates создана запись со статусом `created`.
        - Gateway выпустил счёт с callback'ами confirmpay / declinepay.
        - Soviet поставлен в известность (`newpackage` → «joincoop»).

    - step: 2
      title: Оплата взносов
      actor: gateway_operator
      action: registrator::confirmpay
      description: >
        Пайщик оплачивает счёт (банковский перевод / криптоплатёж).
        Оператор Gateway, получив подтверждение зачисления от платёжной
        системы, вызывает confirmpay. Контракт переводит кандидата в
        статус `payed` и создаёт повестку в совете (callback'и
        confirmreg / declinereg).
      pre:
        - Кандидат в статусе `created`.
        - Gateway получил оплату на сумму initial + minimum.
      post:
        - Кандидат переводится в статус `payed`.
        - Soviet получает повестку «joincoop».

    - step: 3
      title: Утверждение советом
      actor: soviet
      action: registrator::confirmreg
      description: >
        Совет кооператива рассматривает повестку и принимает решение.
        При положительном решении contract confirmreg:
        (1) проставляет accounts.status = `active`;
        (2) добавляет пайщика в список участников (soviet::addpartcpnt);
        (3) применяет две ledger2-операции: o.reg.payent (вступительный
        взнос, Дт 51 / Кт 86) и o.reg.putmin (минимальный паевой взнос,
        Дт 51 / Кт 80). Запись кандидата удаляется.
      pre:
        - Кандидат в статусе `payed`.
        - Документ authorization от совета подписан.
      post:
        - accounts.status = `active` — пайщик стал активным членом кооператива.
        - Добавлен участник в soviet::participants.
        - В ledger2 применены o.reg.payent + o.reg.putmin.
        - Запись кандидата удалена из таблицы candidates.

  alternatives:
    - branch: Отказ на этапе оплаты
      at_step: 2
      action: registrator::declinepay
      actor: gateway_operator
      description: >
        Платёж не прошёл или был отменён. Gateway вызывает declinepay, кандидат
        удаляется, ledger2-операции не создаются. Пайщик может повторить
        подачу заявления.


    - branch: Отказ совета
      at_step: 3
      action: registrator::declinereg
      actor: soviet
      description: >
        Совет отказывает кандидату. Кандидат удаляется, совершённый платёж
        подлежит возврату (возврат оформляется вне этого процесса). В ledger2
        операции o.reg.payent и o.reg.putmin не создаются.

# ── Секция 5. Документы и подписи ───────────────────────────────────────────
documents:
  - step: 1
    title: Заявление на вступление (договор УХД)
    template: statement-reg
    signed_by: [contributor]
    stored_in: candidates.statement
    note: "TODO: сверить идентификатор шаблона с fabric/registry.md"

  - step: 3
    title: Протокол решения совета о приёме пайщика
    template: soviet-decision-reg
    signed_by: [soviet_members]
    stored_in: "(authorization — в параметре действия, не хранится в candidates после удаления записи)"
    note: "TODO: сверить идентификатор шаблона с fabric/registry.md"

# ── Секция 6. Операции ──────────────────────────────────────────────────────
# Процесс мульти-операционный: две записи OPERATION_REGISTRY с process_type = p.reg.accept.
# Обе срабатывают на закрывающем действии confirmreg.
# Источник: ledger2/operations.hpp — записи #1 и #2.
# Slim-формат: коды счетов и id кошельков → человеческие имена
# подставляет фронтенд из cooptypes.Ledger2.
operations:
  - ledger_code: o.reg.payent
    human_name: Вступительный взнос пайщика
    wallet_op: ISSUE
    wallet_from: ''
    wallet_to: w.reg.entry          # Вступительные взносы
    debit: 51                # Расчётный счёт
    credit: 86               # Целевое финансирование
    amount_ref: candidate.initial
    triggered_by: registrator::confirmreg
    description: >
      Первичный вход вступительного взноса на кошелёк «Вступительные взносы».
      Двойная запись Дт 51 / Кт 86 — средства поступили на расчётный счёт и
      квалифицируются как целевые поступления в кооперативный фонд.

  - ledger_code: o.reg.putmin
    human_name: Минимальный паевой взнос при регистрации
    wallet_op: ISSUE
    wallet_from: ''
    wallet_to: w.reg.minshr          # Минимальный паевой взнос
    debit: 51                # Расчётный счёт
    credit: 80               # Паевой фонд (складочный капитал)
    amount_ref: candidate.minimum
    triggered_by: registrator::confirmreg
    description: >
      Первичный вход минимального паевого взноса на кошелёк «Минимальный
      паевой взнос». Двойная запись Дт 51 / Кт 80 — средства поступили
      на расчётный счёт и формируют складочный капитал кооператива.

# ── Секция 7. Связи ─────────────────────────────────────────────────────────
related:
  - process_type: p.wal.depo
    id: public_wallet_deposit_process
    relation: triggers
    note: >
      После получения статуса `active` пайщик может вносить дополнительные
      паевые взносы через процесс «Внесение паевого взноса» (p.wal.depo).

  - process_type: p.wal.wthdrw
    id: public_wallet_withdraw_process
    relation: affects
    note: >
      Выход из кооператива оформляется через обратный процесс «Возврат паевого
      взноса» (p.wal.wthdrw) — он возвращает средства с кошелька SHARE_FUND_PAY.
