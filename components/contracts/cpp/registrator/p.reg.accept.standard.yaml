# ─────────────────────────────────────────────────────────────────────────────
# Стандарт «Приём пайщика» — корневой кооперативный процесс приёма в кооператив.
#
# Манифест в стиле «двухуровневое описание»: каждая описательная секция
# содержит короткий tagline и развёрнутый абзац — для тех, кто пробегает
# глазами, и для тех, кто читает вдумчиво.
#
# Источники правды в коде:
#   • cpp/registrator/registrator.hpp                 — actions
#   • cpp/registrator/src/user/{reguser,confirmpay,confirmreg,declinepay,declinereg}.cpp
#   • cpp/lib/core/ledger2/operations.hpp             — OPERATION_REGISTRY (o.reg.payent, o.reg.putmin)
#   • cpp/lib/core/ledger2/processes.hpp              — processes::registrator::ACCEPT
#   • cpp/lib/core/ledger2/wallets.hpp                — w.reg.entry, w.reg.minshr
#   • cpp/lib/core/ledger2/accounts.hpp               — 51 / 80 / 86
# ─────────────────────────────────────────────────────────────────────────────

# ── Секция 1. Паспорт ───────────────────────────────────────────────────────
process_type: p.reg.accept
id: public_registrator_accept_process
title: Приём пайщика
slug: accept
status: proposed
contract: registrator
summary: >
  От подписанного заявления о вступлении до карточки активного пайщика
  и двух взносов, поставленных на учёт в книге Ledger2.
purpose: >
  «Приём пайщика» — корневой кооперативный процесс. Им человек или
  организация входят в кооператив и получают доступ ко всем остальным
  процессам: внесению и возврату паевых взносов, займам, инвестициям
  в программу «Благорост», голосованию в совете и на общих собраниях.

  В процессе участвуют трое. Кандидат подписывает заявление и оплачивает
  два взноса: вступительный (за факт приёма) и минимальный паевой
  (стартовый вклад в паевой фонд). Кассир — это роль человека,
  работающего с контрактом Gateway, — подтверждает зачисление средств.
  Совет кооператива принимает решение по повестке.

  В момент положительного решения совета в книге Ledger2 одновременно
  возникают две учётные операции: вступительный взнос ложится на
  кошелёк «Вступительные взносы» (w.reg.entry, проводка Дт 51 / Кт 86 —
  целевые поступления), а минимальный паевой взнос — на кошелёк
  «Минимальный паевой взнос» (w.reg.minshr, проводка Дт 51 / Кт 80 —
  паевой фонд). Карточка кандидата удаляется, в реестре участников
  появляется активный пайщик.

  Жизненный цикл реализован составной сущностью: статус сначала
  отслеживается в таблице `candidates` (`created` → `payed`), а финальный
  `active` проставляется в таблице `accounts`. Это типовая для платформы
  схема «карточка-черновик → постоянная карточка участника».
roles:
  - contributor        # будущий пайщик
  - chairman           # председатель / администратор (запускает reguser от имени coopname)
  - gateway_operator   # кассир (роль человека, работающего с контрактом Gateway)
  - soviet             # совет кооператива

# ── Секция 2. Действия контракта (блокчейн-уровень) ─────────────────────────
actions:
  - name: registrator::reguser
    human: Подать заявление
    actor: contributor
    role: opener
    purpose: >
      Кандидат подписывает заявление, контракт открывает карточку и поручает кассиру выпустить счёт.

      Будущий пайщик подписывает «Заявление на вступление в кооператив»
      (#100) своей ЭЦП. Приложение кооператива от имени `coopname`
      вызывает `registrator::reguser`, передавая тип пользователя
      (individual / entrepreneur / organization) и территориальный участок
      (`braname`). Контракт сохраняет документ, заводит запись `candidate`
      в статусе `created` и поручает контракту Gateway выпустить кандидату
      счёт на сумму `initial + minimum`. В совет уходит уведомление-повестка
      `joincoop`. Учётных операций ещё нет — это только открытие процесса.

  - name: registrator::confirmpay
    human: Подтвердить оплату
    actor: gateway_operator
    role: progress
    purpose: >
      Кассир подтверждает зачисление взносов — карточка движется к совету.

      Получив подтверждение зачисления от платёжной системы, кассир
      вызывает `registrator::confirmpay`. Контракт переводит карточку
      кандидата в статус `payed` и ставит совету повестку `joincoop`
      с колбэками `confirmreg` / `declinereg`. Деньги пока «в пути» —
      учётные проводки сработают только на финальном решении совета.

  - name: registrator::declinepay
    human: Отклонить оплату
    actor: gateway_operator
    role: reject
    purpose: >
      Кассир отклоняет платёж — процесс прерывается на этапе оплаты.

      Платёж не дошёл, был возвращён или отменён платёжной системой.
      Кассир вызывает `registrator::declinepay`: запись кандидата
      удаляется, в книге Ledger2 операции не создаются. Кандидат
      может подать заявление повторно.

  - name: registrator::confirmreg
    human: Утвердить советом
    actor: soviet
    role: closer
    purpose: >
      Совет утверждает приём — пайщик становится активным, два взноса встают на учёт.

      Совет рассматривает повестку `joincoop` и выносит положительное
      решение, подписывая `authorization`. Контракт делает три вещи:
      (1) меняет `accounts.status` на `active`; (2) добавляет нового пайщика
      в список участников через `soviet::addpartcpnt`; (3) применяет в книге
      Ledger2 две операции — `o.reg.payent` и `o.reg.putmin` — и удаляет
      запись кандидата. С этого момента человек считается активным пайщиком
      кооператива.

  - name: registrator::declinereg
    human: Отклонить советом
    actor: soviet
    role: reject
    purpose: >
      Совет отказывает в приёме — кандидат удаляется, оплаченные взносы возвращаются вне процесса.

      Совет принимает отрицательное решение по повестке `joincoop`. Запись
      кандидата удаляется, операции в книге Ledger2 не создаются. Возврат
      ранее внесённых сумм оформляется отдельно (вне этого стандарта).

# ── Секция 3. Граф состояний ────────────────────────────────────────────────
# Составная сущность: статус отслеживается в таблице `candidates` (created / payed),
# финальный `active` проставляется в таблице `accounts` в действии confirmreg.
# Для BPMN-графа мы показываем единый жизненный цикл процесса.
entity: "registrator::candidate → registrator::account"
entity_human: "Кандидат → пайщик"
entity_source: cpp/registrator/src/user/

states:
  - name: created
    human: Заявление подано
    description: >
      Заявление принято, карточка кандидата открыта, ждём оплаты взносов.

      В таблице `candidates` есть запись со статусом `created`, в реестре
      сохранён документ заявления (#100). Контракт Gateway держит счёт
      кандидату на сумму вступительного и минимального паевого взносов.
      Учётных операций ещё нет.
    kind: normal

  - name: payed
    human: Взносы оплачены
    description: >
      Кассир подтвердил зачисление — повестка отправлена в совет.

      Карточка кандидата в статусе `payed`. Деньги фактически получены,
      но в книге Ledger2 ещё не отражены — проводки появятся только
      после положительного решения совета. В совете открыта повестка
      `joincoop` с колбэками `confirmreg` / `declinereg`.
    kind: normal

  - name: active
    human: Пайщик активен
    description: >
      Финал процесса — пайщик принят в кооператив, два взноса поставлены на учёт.

      `accounts.status` равен `active`, карточка кандидата удалена, человек
      добавлен в список участников совета. В книге Ledger2 проведены две
      операции: вступительный взнос (Дт 51 / Кт 86, w.reg.entry) и
      минимальный паевой взнос (Дт 51 / Кт 80, w.reg.minshr). С этого
      момента пайщик может вносить дополнительные паевые взносы
      (`p.wal.depo`), получать займы (`p.cap.debt`), инвестировать
      в «Благорост» (`p.cap.invest`, `p.cap.rid`, `p.cap.prop`),
      участвовать в собраниях и совете.
    kind: final

  - name: removed
    human: Отклонено
    description: >
      Процесс прерван на этапе оплаты или на этапе совета.

      Запись кандидата удалена, операции в книге Ledger2 не создавались.
      Если до отказа взносы были внесены, возврат оформляется вне этого
      стандарта. Кандидат может подать заявление повторно.
    kind: virtual
    virtual: true

transitions:
  - from: "∅"
    to: created
    action: registrator::reguser
    actor: contributor
    guards:
      - Участник не состоит в кооперативе и не имеет активной карточки участника.
      - Тип пользователя ∈ {individual, entrepreneur, organization}.
      - Заявление подписано ЭЦП.

  - from: created
    to: payed
    action: registrator::confirmpay
    actor: gateway_operator
    guards:
      - Кассир подтвердил зачисление суммы = initial + minimum.

  - from: created
    to: removed
    action: registrator::declinepay
    actor: gateway_operator
    guards:
      - Оплата не поступила / отклонена.

  - from: payed
    to: active
    action: registrator::confirmreg
    actor: soviet
    ledger_code: p.reg.accept
    operations:
      - o.reg.payent
      - o.reg.putmin
    guards:
      - Совет принял положительное решение по повестке.

  - from: payed
    to: removed
    action: registrator::declinereg
    actor: soviet
    guards:
      - Совет принял отрицательное решение по повестке.

# ── Секция 4. Сценарий ──────────────────────────────────────────────────────
scenario:
  steps:
    - step: 1
      title: Подача заявления
      actor: contributor
      action: registrator::reguser
      description: >
        Кандидат подписывает заявление, контракт открывает карточку.

        Будущий пайщик оформляет и подписывает заявление о вступлении.
        Приложение кооператива вызывает `registrator::reguser`
        (с подписью `coopname`), указывая тип пользователя и
        территориальный участок. Контракт создаёт запись кандидата
        в статусе `created` и поручает контракту Gateway выпустить
        счёт на сумму «вступительный + минимальный паевой взнос».
      pre:
        - Участник ещё не имеет карточки в картотеке и не состоит в кооперативе.
        - Тип пользователя валиден.
      post:
        - В таблице candidates создана запись со статусом `created`.
        - Контракт Gateway выпустил счёт с колбэками confirmpay / declinepay.
        - В совет ушла повестка `joincoop`.

    - step: 2
      title: Оплата взносов
      actor: gateway_operator
      action: registrator::confirmpay
      description: >
        Деньги пришли — карточка движется к совету.

        Кандидат оплачивает счёт (банковский перевод или криптоплатёж).
        Кассир, получив подтверждение зачисления от платёжной системы,
        вызывает `confirmpay`. Контракт переводит кандидата в статус
        `payed` и создаёт повестку в совете с колбэками
        `confirmreg` / `declinereg`. Учётных проводок ещё нет.
      pre:
        - Кандидат в статусе `created`.
        - На расчётный счёт получена сумма initial + minimum.
      post:
        - Кандидат в статусе `payed`.
        - В совете открыта повестка `joincoop`.

    - step: 3
      title: Утверждение советом
      actor: soviet
      action: registrator::confirmreg
      description: >
        Совет утверждает приём — два взноса встают на учёт, кандидат становится пайщиком.

        Совет рассматривает повестку `joincoop`. При положительном
        решении контракт `confirmreg`: (1) меняет `accounts.status`
        на `active`; (2) добавляет нового пайщика в список участников
        совета (`soviet::addpartcpnt`); (3) применяет в книге Ledger2
        две операции — `o.reg.payent` (вступительный взнос, Дт 51 / Кт 86)
        и `o.reg.putmin` (минимальный паевой взнос, Дт 51 / Кт 80).
        Запись кандидата удаляется.
      pre:
        - Кандидат в статусе `payed`.
        - Документ `authorization` от совета подписан.
      post:
        - accounts.status = `active` — пайщик стал активным членом кооператива.
        - Пайщик добавлен в soviet::participants.
        - В книге Ledger2 проведены o.reg.payent + o.reg.putmin.
        - Запись кандидата удалена из таблицы candidates.

  alternatives:
    - branch: Отказ на этапе оплаты
      at_step: 2
      action: registrator::declinepay
      actor: gateway_operator
      description: >
        Платёж не прошёл или был отменён.

        Кассир вызывает `declinepay`, кандидат удаляется, операции
        в книге Ledger2 не создаются. Кандидат может повторить подачу
        заявления.

    - branch: Отказ совета
      at_step: 3
      action: registrator::declinereg
      actor: soviet
      description: >
        Совет отказывает кандидату.

        Запись кандидата удаляется, совершённый платёж подлежит возврату
        (возврат оформляется вне этого процесса). Операции в книге Ledger2
        не создаются.

# ── Секция 5. Документы и подписи ───────────────────────────────────────────
documents:
  - action: registrator::reguser
    title: Заявление на вступление в кооператив
    registry_id: 100
    signed_by: [ Кандидат ]
    stored_in: candidates.statement

  - action: registrator::confirmreg
    title: Решение совета о приёме пайщика в кооператив
    registry_id: 501
    signed_by: [ Совет ]
    stored_in: "(authorization — в параметре действия, не хранится в candidates после удаления записи)"

# ── Секция 6. Операции ──────────────────────────────────────────────────────
# Процесс мульти-операционный: две записи OPERATION_REGISTRY с process_type = p.reg.accept.
# Обе срабатывают на закрывающем действии confirmreg.
operations:
  - ledger_code: o.reg.payent
    human_name: Вступительный взнос пайщика
    wallet_op: ISSUE
    wallet_from: ''
    wallet_to: w.reg.entry
    debit: 51
    credit: 86
    amount_ref: candidate.initial
    triggered_by: registrator::confirmreg
    description: >
      Постановка вступительного взноса на учёт — целевые поступления кооператива.

      В момент положительного решения совета (`registrator::confirmreg`)
      сумма `candidate.initial` зачисляется на кошелёк «Вступительные
      взносы» (w.reg.entry). Двойная запись Дт 51 / Кт 86: средства уже
      на расчётном счёте кооператива и квалифицируются как целевые
      поступления в кооперативный фонд. Эта операция фиксирует факт
      приёма кандидата в кооператив.

  - ledger_code: o.reg.putmin
    human_name: Минимальный паевой взнос при регистрации
    wallet_op: ISSUE
    wallet_from: ''
    wallet_to: w.reg.minshr
    debit: 51
    credit: 80
    amount_ref: candidate.minimum
    triggered_by: registrator::confirmreg
    description: >
      Постановка минимального паевого взноса на учёт — стартовый вклад в паевой фонд.

      Парная операция к `o.reg.payent`: сумма `candidate.minimum`
      появляется на кошельке «Минимальный паевой взнос» (w.reg.minshr).
      Двойная запись Дт 51 / Кт 80 — деньги на расчётном счёте формируют
      складочный капитал кооператива. После этой проводки минимальный
      паевой взнос становится «доступным остатком» пайщика — основой
      для всех его последующих кооперативных операций.

# ── Секция 7. Связи ─────────────────────────────────────────────────────────
related:
  - process_type: p.wal.depo
    id: public_wallet_deposit_process
    relation: triggers
    note: >
      После статуса `active` пайщик может вносить дополнительные паевые
      взносы через процесс «Внесение паевого взноса» (p.wal.depo). Каждый
      такой взнос пополняет кошелёк SHARE_FUND_PAY (w.wal.share) — основу
      для дальнейших операций пайщика (займы, проекты, выходы).

  - process_type: p.wal.wthdrw
    id: public_wallet_withdraw_process
    relation: affects
    note: >
      Выход из кооператива (или частичный возврат паевого взноса деньгами)
      оформляется обратным процессом «Возврат паевого взноса»
      (p.wal.wthdrw) — он списывает средства с кошелька SHARE_FUND_PAY
      по авторизации совета.
