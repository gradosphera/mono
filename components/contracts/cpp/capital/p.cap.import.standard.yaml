# ─────────────────────────────────────────────────────────────────────────────
# Стандарт «Импорт пайщика Благорост (offline)» — миграция исторического
# пайщика программы «Благорост» из офлайн-учёта в цифровой кооператив с
# единовременным внесением учётной суммы паевого взноса.
#
# Одноактовый процесс. Ledger2 одной операцией o.cap.import фиксирует
# первичный вход средств на кошелёк «Благорост — инвестиции деньгами» (9001)
# с двойной записью Дт 51 / Кт 80.
#
# Источники правды в коде:
#   • cpp/capital/capital.hpp                              — actions
#   • cpp/capital/src/import/importcontrib.cpp             — реализация
#   • cpp/lib/core/ledger2/operations.hpp                  — o.cap.import
#   • cpp/lib/core/ledger2/processes.hpp                   — processes::capital::IMPORT
# ─────────────────────────────────────────────────────────────────────────────

# ── Секция 1. Паспорт ───────────────────────────────────────────────────────
process_type: p.cap.import
id: public_capital_import_process
title: Импорт пайщика
slug: import
status: proposed
contract: capital
summary: >
  Внесение в реестр кооператива пайщика, который участвовал в программе
  «Благорост» до перехода на цифровой учёт, с фиксацией ранее накопленного
  паевого взноса деньгами.
purpose: >
  Технический процесс единовременного импорта исторического участника
  программы «Благорост». Срабатывает один раз: контракт создаёт запись
  пайщика и одной ledger2-операцией o.cap.import заносит сумму его
  ранее внесённого паевого взноса на кошелёк «Благорост — инвестиции
  деньгами» (9001). Документального оформления не требует — данные
  переносятся из офлайн-учёта по решению председателя.
roles:
  - chairman
  - contributor

# ── Секция 2. Действия контракта ────────────────────────────────────────────
actions:
  - name: capital::importcontrib
    human: Импортировать пайщика
    actor: chairman
    role: closer
    purpose: >
      Закрывающее одношаговое действие: председатель оформляет в реестре
      кооператива нового пайщика — участника «Благорост», передавая ранее
      накопленную сумму его паевого взноса. В ledger2 применяется операция
      o.cap.import (ISSUE → 9001, Дт 51 / Кт 80).

# ── Секция 3. Граф состояний ────────────────────────────────────────────────
entity: capital::contributor
entity_human: Пайщик «Благорост»
entity_source: cpp/capital/src/import/

states:
  - name: imported
    human: Импортирован
    description: >
      Пайщик зафиксирован в реестре с признаком «импортированный участник»,
      сумма прежнего паевого взноса учтена на кошельке «Благорост —
      инвестиции деньгами» (9001) с проводкой Дт 51 / Кт 80.
    kind: final

transitions:
  - from: "∅"
    to: imported
    action: capital::importcontrib
    actor: chairman
    ledger_code: o.cap.import
    operations:
      - o.cap.import
    guards:
      - Участник ещё не зарегистрирован в кооперативе.
      - contribute_hash уникален.
      - Сумма переноса валидна (положительна, в системном символе).

# ── Секция 4. Сценарий ──────────────────────────────────────────────────────
scenario:
  steps:
    - step: 1
      title: Импорт исторического пайщика
      actor: chairman
      action: capital::importcontrib
      description: >
        Председатель импортирует ранее существовавшего офлайн-пайщика
        программы «Благорост»: контракт создаёт запись участника со
        статусом «импортирован», `contributed_as_investor` равно перенесённой
        сумме, и одной ledger2-операцией o.cap.import зачисляет средства
        на кошелёк «Благорост — инвестиции деньгами» (9001) с проводкой
        Дт 51 / Кт 80.
      pre:
        - Председатель уполномочен на оформление импорта.
        - Участник не существует в реестре.
        - Сумма паевого взноса определена в офлайн-учёте.
      post:
        - В реестре создана запись пайщика с признаком «импортированный».
        - На кошельке 9001 учтена сумма паевого взноса.
        - В ledger2 применена операция o.cap.import.

  alternatives: []

# ── Секция 5. Документы и подписи ───────────────────────────────────────────
# Импорт исторических данных не требует подписания договора — данные
# фиксируются по решению председателя в качестве исходного состояния.
documents: []

# ── Секция 6. Операции ──────────────────────────────────────────────────────
operations:
  - ledger_code: o.cap.import
    human_name: Паевой взнос по ЦПП «Благорост» (офлайн-импорт)
    wallet_op: ISSUE
    wallet_from: null
    wallet_to: 9001            # ЦПП «Благорост» — инвестиции деньгами
    debit: 51                  # Расчётный счёт
    credit: 80                 # Паевой фонд (складочный капитал)
    amount_ref: contributor.contribution_amount
    triggered_by: capital::importcontrib
    description: >
      Первичный вход средств на кошелёк «ЦПП Благорост — инвестиции деньгами»
      (9001). Двойная запись Дт 51 / Кт 80 — деньги учтены на расчётном
      счёте кооператива и формируют складочный капитал. Признак офлайн-импорта
      фиксирует, что сумма перенесена из исторического учёта.

# ── Секция 7. Связи ─────────────────────────────────────────────────────────
related:
  - process_type: p.reg.accept
    id: public_registrator_accept_process
    relation: affects
    note: >
      Альтернативный путь входа в кооператив — через приём пайщика
      (p.reg.accept). Импорт «Благорост» используется только для
      исторических участников, минуя стандартный приём.

  - process_type: p.cap.invest
    id: public_capital_invest_process
    relation: triggers
    note: >
      После импорта пайщик может инвестировать в «Благорост» средствами
      деньгами (p.cap.invest), переводя сумму с SHARE_FUND_PAY (2001)
      на BLAGOROST_INVEST (9001).
