# ─────────────────────────────────────────────────────────────────────────────
# Стандарт «Запрос маркетплейса» — обмен имуществом между пайщиками через
# кооператив с двойной конвертацией (деньги → имущество и обратно).
#
# Многоступенчатый процесс (10+ узлов состояний). Две ledger2-операции:
#   • o.mkt.supply  — подтверждение поставки на КУ (ISSUE → w.wal.share, Дт 51 / Кт 80)
#   • o.mkt.recv    — выплата поставщику после получения (TRANSFER w.wal.share → w.mkt.payout, Дт 80 / Кт 51)
#
# Источники правды в коде:
#   • cpp/marketplace/marketplace.hpp                                  — actions
#   • cpp/marketplace/src/deliver_on_offer/                            — реализация
#   • cpp/lib/domain/table_marketplace_requests.hpp                    — entity requests
#   • cpp/lib/core/ledger2/operations.hpp                              — o.mkt.supply, o.mkt.recv
#   • cpp/lib/core/ledger2/processes.hpp                               — processes::marketplace::REQUEST
# ─────────────────────────────────────────────────────────────────────────────

# ── Секция 1. Паспорт ───────────────────────────────────────────────────────
process_type: p.mkt.reqst
id: public_marketplace_request_process
title: Исполнение заказа на поставку имущества
slug: request
status: proposed
contract: marketplace
summary: >
  Пайщик-заказчик размещает заявку на товар, поставщик принимает её, совет
  авторизует обе стороны (взнос и возврат), товар поставляется и принимается
  с гарантийным периодом. После завершения поставщик получает выплату.
purpose: >
  «Исполнение заказа на поставку имущества» — кооператив принимает
  имущество у одного пайщика и передаёт его другому. Контрагентом
  для обеих сторон выступает сам кооператив: совет одновременно
  авторизует приём от поставщика и выдачу заказчику, кооперативный
  участок физически принимает имущество и передаёт его заказчику,
  поставщику начисляется выплата после подтверждения получения
  и истечения гарантийного срока.
roles:
  - contributor       # заказчик (money-contributor) и поставщик (product-contributor)
  - soviet
  - chairman          # представитель кооперативного участка (КУ)

# ── Секция 2. Действия контракта ────────────────────────────────────────────
actions:
  - name: marketplace::orderoffer
    human: Создать заявку
    actor: contributor
    role: opener
    purpose: >
      Заказчик размещает заявку на товар: блокирует денежные средства,
      подписывает документы конвертации входящей и возврата товара.
  - name: marketplace::accept
    human: Принять заявку
    actor: contributor
    role: progress
    purpose: >
      Поставщик принимает заявку: подписывает встречную конвертацию и
      заявление о внесении имущественного паевого взноса. В совет
      отправляются две повестки.
  - name: marketplace::authcontrib
    human: Авторизовать взнос имуществом
    actor: soviet
    role: progress
    purpose: Совет авторизует имущественный взнос поставщика.
  - name: marketplace::authreturn
    human: Авторизовать возврат
    actor: soviet
    role: progress
    purpose: >
      Совет авторизует возврат имущества (если придётся). Когда обе
      авторизации получены, статус заявки → `authorized`.
  - name: marketplace::supply
    human: Поставить имущество
    actor: contributor
    role: progress
    purpose: >
      Поставщик поставляет имущество на кооперативный участок и подписывает
      акт поставки.
  - name: marketplace::supplcnf
    human: Подтвердить поставку
    actor: chairman
    role: progress
    purpose: >
      Представитель кооперативного участка подтверждает приём имущества.
      Применяется ledger2-операция o.mkt.supply — имущество поступает в
      SHARE_FUND с проводкой Дт 51 / Кт 80.
  - name: marketplace::delivered
    human: Подготовить к выдаче
    actor: chairman
    role: progress
    purpose: >
      Кооперативный участок переводит имущество в статус «готово к выдаче».
  - name: marketplace::receive
    human: Получить имущество
    actor: contributor
    role: progress
    purpose: >
      Заказчик получает имущество на КУ и подписывает первый акт получения.
  - name: marketplace::receivecnf
    human: Подтвердить получение
    actor: contributor
    role: progress
    purpose: >
      Заказчик подписывает второй акт — приём имущества подтверждён.
      Применяется ledger2-операция o.mkt.recv — выплата поставщику
      (TRANSFER w.wal.share → w.mkt.payout, Дт 80 / Кт 51), устанавливается гарантийный период.
  - name: marketplace::complete
    human: Завершить
    actor: chairman
    role: closer
    purpose: >
      После истечения гарантийного периода заявка завершается, запись удаляется.
  - name: marketplace::declineacc
    human: Отклонить советом
    actor: soviet
    role: reject
    purpose: >
      Совет отклонил приём заявки. Заблокированные средства возвращаются
      заказчику, запись удаляется.
  - name: marketplace::decline
    human: Отказ на этапе принятия
    actor: contributor
    role: reject
    purpose: >
      Заявка отменена в статусе `active` или `accepted` (до авторизации).
      Заблокированные средства возвращаются заказчику.
  - name: marketplace::cancel
    human: Отменить с комиссией
    actor: contributor
    role: reject
    purpose: >
      Отмена инициатором (заказчик/поставщик) до подтверждения поставки.
      Удерживается комиссия за отмену, остаток возвращается.

# ── Секция 3. Граф состояний ────────────────────────────────────────────────
entity: marketplace::request
entity_human: Заявка маркетплейса
entity_source: cpp/marketplace/src/deliver_on_offer/

states:
  - name: active
    human: Заявка размещена
    description: >
      Заказчик создал заявку, средства заблокированы на его кошельке.
    kind: normal
  - name: accepted
    human: Поставщик принял
    description: >
      Поставщик принял заявку, в совете созданы две повестки авторизации.
    kind: normal
  - name: authorized
    human: Авторизовано советом
    description: Получены обе авторизации совета — заявка готова к поставке.
    kind: normal
  - name: supplied1
    human: Имущество поставлено
    description: Поставщик передал имущество на кооперативный участок.
    kind: normal
  - name: supplied2
    human: Поставка подтверждена
    description: >
      КУ подтвердил приём имущества. Применена o.mkt.supply — имущество
      в SHARE_FUND.
    kind: normal
  - name: delivered
    human: Готово к выдаче
    description: КУ подготовил имущество к выдаче заказчику.
    kind: normal
  - name: received1
    human: Заказчик получил
    description: Заказчик получил имущество и подписал акт-1.
    kind: normal
  - name: received2
    human: Получение подтверждено
    description: >
      Заказчик подписал акт-2. Применена o.mkt.recv — поставщик получил
      выплату. Установлен гарантийный период.
    kind: normal
  - name: completed
    human: Завершено
    description: >
      Гарантийный период истёк, заявка закрыта, запись удалена.
    kind: final
  - name: removed
    human: Отклонено / отменено
    description: >
      Заявка прервана: средства возвращены, запись удалена. Операции
      ledger2 не создавались (или возвращены).
    kind: virtual
    virtual: true

transitions:
  - from: "∅"
    to: active
    action: marketplace::orderoffer
    actor: contributor
    guards:
      - Заказчик активен. Достаточный остаток на SHARE_FUND_PAY.
      - Подписаны RETURN_STMT и CONVERT_FROM.

  - from: active
    to: accepted
    action: marketplace::accept
    actor: contributor
    guards:
      - Поставщик активен.
      - Подписаны CONVERT_TO и CONTRIB_STMT.

  - from: accepted
    to: authorized
    action: marketplace::authcontrib
    actor: soviet
    guards:
      - Подписана CONTRIB_AUTH.
      - Также получена RETURN_AUTH.

  - from: accepted
    to: authorized
    action: marketplace::authreturn
    actor: soviet
    guards:
      - Подписана RETURN_AUTH.
      - Также получена CONTRIB_AUTH.

  - from: authorized
    to: supplied1
    action: marketplace::supply
    actor: contributor
    guards:
      - Поставщик подписал акт поставки.

  - from: supplied1
    to: supplied2
    action: marketplace::supplcnf
    actor: chairman
    ledger_code: o.mkt.supply
    operations:
      - o.mkt.supply
    guards:
      - Представитель КУ подтвердил приём имущества.

  - from: supplied2
    to: delivered
    action: marketplace::delivered
    actor: chairman
    guards:
      - КУ подготовил имущество к выдаче.

  - from: delivered
    to: received1
    action: marketplace::receive
    actor: contributor
    guards:
      - Заказчик получил имущество.

  - from: received1
    to: received2
    action: marketplace::receivecnf
    actor: contributor
    ledger_code: o.mkt.recv
    operations:
      - o.mkt.recv
    guards:
      - Заказчик подписал акт-2 получения.

  - from: received2
    to: completed
    action: marketplace::complete
    actor: chairman
    guards:
      - Гарантийный период истёк.

  - from: active
    to: removed
    action: marketplace::decline
    actor: contributor
    guards:
      - Заявка отменена до принятия.
  - from: accepted
    to: removed
    action: marketplace::declineacc
    actor: soviet
    guards:
      - Совет отклонил заявку до авторизации.
  - from: accepted
    to: removed
    action: marketplace::cancel
    actor: contributor
    guards:
      - Отмена с удержанием комиссии до supplied2.

# ── Секция 4. Сценарий ──────────────────────────────────────────────────────
scenario:
  steps:
    - step: 1
      title: Создание заявки
      actor: contributor
      action: marketplace::orderoffer
      description: >
        Заказчик размещает заявку на товар: блокирует средства, подписывает
        RETURN_STMT (возврат) и CONVERT_FROM (входящая конвертация).
    - step: 2
      title: Принятие поставщиком
      actor: contributor
      action: marketplace::accept
      description: >
        Поставщик подписывает CONVERT_TO и CONTRIB_STMT, в совете создаются
        две повестки.
    - step: 3
      title: Авторизация советом
      actor: soviet
      action: marketplace::authcontrib
      description: >
        Совет подписывает CONTRIB_AUTH (взнос имуществом) и RETURN_AUTH
        (возврат имущества). По обеим авторизациям статус → `authorized`.
    - step: 4
      title: Поставка имущества
      actor: contributor
      action: marketplace::supply
      description: Поставщик доставляет имущество на КУ и подписывает SUPPLY_ACT.
    - step: 5
      title: Подтверждение поставки
      actor: chairman
      action: marketplace::supplcnf
      description: >
        Представитель КУ подтверждает приём (SUPPLY_ACT_CONF). Применяется
        o.mkt.supply — имущество поступает в SHARE_FUND (Дт 51 / Кт 80).
    - step: 6
      title: Получение заказчиком
      actor: contributor
      action: marketplace::receive
      description: Заказчик получает имущество, подписывает RECEIVE_ACT.
    - step: 7
      title: Подтверждение получения
      actor: contributor
      action: marketplace::receivecnf
      description: >
        Заказчик подписывает RECEIVE_ACT_CONF. Применяется o.mkt.recv —
        выплата поставщику (TRANSFER w.wal.share → w.mkt.payout, Дт 80 / Кт 51), установлен
        гарантийный период.
    - step: 8
      title: Завершение по гарантии
      actor: chairman
      action: marketplace::complete
      description: По истечении гарантийного срока заявка закрывается.

  alternatives:
    - branch: Отказ совета
      at_step: 3
      action: marketplace::declineacc
      actor: soviet
      description: Совет отклоняет — средства возвращаются, запись удаляется.
    - branch: Отказ заказчика до принятия
      at_step: 1
      action: marketplace::decline
      actor: contributor
      description: Отмена до accept — средства возвращаются.
    - branch: Отмена с комиссией
      at_step: 4
      action: marketplace::cancel
      actor: contributor
      description: Отмена до supplied2 — удерживается комиссия.

# ── Секция 5. Документы и подписи ───────────────────────────────────────────
documents:
  - step: 1
    title: Заявление о возврате имущества (RETURN_STMT)
    template: mkt-return-stmt
    registry_id: 0
    signed_by: [contributor]
    stored_in: requests.documents
  - step: 1
    title: Конвертация входящих средств (CONVERT_FROM)
    template: mkt-convert-from
    registry_id: 0
    signed_by: [contributor]
    stored_in: requests.documents
  - step: 2
    title: Конвертация исходящих (CONVERT_TO)
    template: mkt-convert-to
    registry_id: 0
    signed_by: [contributor]
    stored_in: requests.documents
  - step: 2
    title: Заявление об имущественном паевом взносе поставщика (CONTRIB_STMT)
    template: mkt-contrib-stmt
    registry_id: 0
    signed_by: [contributor]
    stored_in: requests.documents
  - step: 3
    title: Авторизация совета на имущественный взнос (CONTRIB_AUTH)
    template: mkt-contrib-auth
    registry_id: 0
    signed_by: [soviet]
    stored_in: requests.documents
  - step: 3
    title: Авторизация совета на возврат имущества (RETURN_AUTH)
    template: mkt-return-auth
    registry_id: 0
    signed_by: [soviet]
    stored_in: requests.documents
  - step: 4
    title: Акт поставки (SUPPLY_ACT)
    template: mkt-supply-act
    registry_id: 0
    signed_by: [contributor]
    stored_in: requests.documents
  - step: 5
    title: Акт подтверждения поставки (SUPPLY_ACT_CONF)
    template: mkt-supply-act-conf
    registry_id: 0
    signed_by: [chairman]
    stored_in: requests.documents
  - step: 6
    title: Акт получения (RECEIVE_ACT)
    template: mkt-receive-act
    registry_id: 0
    signed_by: [contributor]
    stored_in: requests.documents
  - step: 7
    title: Акт подтверждения получения (RECEIVE_ACT_CONF)
    template: mkt-receive-act-conf
    registry_id: 0
    signed_by: [contributor]
    stored_in: requests.documents

# ── Секция 6. Операции ──────────────────────────────────────────────────────
operations:
  - ledger_code: o.mkt.supply
    human_name: Подтверждение поставки
    wallet_op: ISSUE
    wallet_from: ''
    wallet_to: w.wal.share            # ЦПП «Цифровой Кошелёк» — паевые взносы деньгами
    debit: 51                  # Расчётный счёт
    credit: 80                 # Паевой фонд (складочный капитал)
    amount_ref: request.total_cost
    triggered_by: marketplace::supplcnf
    description: >
      Имущество поступило на кооперативный участок. В ledger2 фиксируется
      приход в SHARE_FUND поставщика — основание для последующей выплаты
      из паевого фонда.

  - ledger_code: o.mkt.recv
    human_name: Подтверждение получения — выплата поставщику
    wallet_op: TRANSFER
    wallet_from: w.wal.share          # ЦПП «Цифровой Кошелёк» — паевые взносы деньгами
    wallet_to: w.mkt.payout            # Выплаты поставщикам
    debit: 80                  # Паевой фонд
    credit: 51                 # Расчётный счёт
    amount_ref: request.base_cost
    triggered_by: marketplace::receivecnf
    description: >
      После подтверждения получения заказчиком средства уходят с SHARE_FUND
      поставщика на кошелёк выплат поставщикам — фактическая денежная
      выплата за поставленное имущество.

# ── Секция 7. Связи ─────────────────────────────────────────────────────────
related:
  - process_type: p.wal.depo
    id: public_wallet_deposit_process
    relation: provides
    note: >
      Заказчик и поставщик должны иметь остаток на SHARE_FUND_PAY — его
      создаёт «Внесение паевого взноса» (p.wal.depo).
