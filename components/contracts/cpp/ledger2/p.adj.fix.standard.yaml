# ─────────────────────────────────────────────────────────────────────────────
# Стандарт «Ручная корректировка председателя» — единственный процесс с
# динамическими параметрами операций (не входит в OPERATION_REGISTRY).
# Назначение: исправление ошибок учёта, не вытекающих из штатных сценариев.
#
# Две операции с kind='adjustment' и динамическими параметрами:
#   • o.adj.walmove — перевод между кошельками одного пайщика без проводок
#   • o.adj.rev     — откат ранее применённой операции по записи в blockchain_actions
#
# Источники правды в коде:
#   • cpp/ledger2/ledger2.hpp                                        — actions walmove, revert
#   • cpp/ledger2/src/adjust/walmove.cpp                             — реализация WALMOVE
#   • cpp/ledger2/src/adjust/revert.cpp                              — реализация REVERSAL
#   • cpp/lib/core/ledger2/operations.hpp                            — OPERATION_ADJUSTMENT_REGISTRY
#   • cpp/lib/core/ledger2/processes.hpp                             — processes::ledger2::CORRECTION
# ─────────────────────────────────────────────────────────────────────────────

# ── Секция 1. Паспорт ───────────────────────────────────────────────────────
process_type: p.adj.fix
id: public_ledger2_correction_process
title: Ручная корректировка председателя
slug: correction
status: proposed
contract: ledger2
summary: >
  Председатель или контракт-инициатор вносит ручную корректировку в учёт:
  переводит средства между кошельками одного пайщика (walmove) или откатывает
  ранее применённую операцию (revert).
purpose: >
  Особый процесс ledger2: операции этого типа не зашиты в OPERATION_REGISTRY,
  параметры (источник, приёмник, счета, сумма) задаются в каждом вызове.
  Используется для исправления ошибок учёта вне штатных сценариев.

  Две формы:
  (1) walmove — переброска средств между двумя кошельками одного пайщика.
  Применяется как WALLET_ONLY: нет бухпроводок, деньги фактически остаются
  на одном расчётном счёте кооператива, но в учёте пайщика они переходят
  с одного аналитического кошелька на другой. Авторизуется председателем
  (coopname@active).

  (2) revert — откат уже применённой операции. Контракт-инициатор передаёт
  id записи в blockchain_actions и подготовленные параметры зеркала
  (mirror_*). Откат может быть TRANSFER, WALLET_ONLY или REVOKE (зеркало
  ISSUE) — в зависимости от исходной операции. Авторизация — только из
  whitelisted-контрактов; председатель напрямую инициировать не может,
  чтобы не рассинхронизировать состояние сущностей контрактов-инициаторов.

  Откат миграционных операций (o.mig.*) запрещён. Повторный откат отката
  разрешён.
roles:
  - chairman
  - system

# ── Секция 2. Действия контракта ────────────────────────────────────────────
actions:
  - name: ledger2::walmove
    human: Переброска кошельков
    actor: chairman
    role: closer
    purpose: >
      Председатель переводит сумму между двумя кошельками одного пайщика
      (только WALLET_ONLY, без бухпроводок). Используется для исправления
      аналитического распределения после миграций или мелких ошибок учёта.
      Обязательное memo (1..255 символов) фиксирует обоснование.
  - name: ledger2::revert
    human: Откат операции
    actor: system
    role: closer
    purpose: >
      Контракт-инициатор (из whitelist: registrator, wallet, capital,
      marketplace, soviet и др.) запрашивает откат ранее применённой
      операции. Контракт ledger2 применяет inline walletop с зеркальными
      параметрами и при необходимости debit/credit-проводки. Председатель
      напрямую инициировать revert не может.

# ── Секция 3. Граф состояний ────────────────────────────────────────────────
# Процесс безличный: операция применяется немедленно одним action'ом, не
# имеет состояния entity. В графе оба узла совпадают с действием.
entity: ledger2::adjustment
entity_human: Корректировка
entity_source: cpp/ledger2/src/adjust/

states:
  - name: applied
    human: Применено
    description: >
      Корректировка зафиксирована в blockchain_actions с уникальным
      process_hash. Состояния «pending» нет: операция применяется синхронно.
    kind: final

transitions:
  - from: "∅"
    to: applied
    action: ledger2::walmove
    actor: chairman
    ledger_code: o.adj.walmove
    operations:
      - o.adj.walmove
    guards:
      - Авторизация coopname@active.
      - Кошельки from_wallet ≠ to_wallet, оба в LEDGER2_WALLET_REGISTRY.
      - Сумма > 0, символ = root_govern_symbol.
      - Memo не пусто (1..255 символов).
      - process_hash уникален.

  - from: "∅"
    to: applied
    action: ledger2::revert
    actor: system
    ledger_code: o.adj.rev
    operations:
      - o.adj.rev
    guards:
      - Авторизация — только из contracts_whitelist (председатель напрямую запрещён).
      - original_operation_code ≠ o.mig.* (откат миграционных операций запрещён).
      - mirror_wallet_op ∈ {ISSUE, TRANSFER, WALLET_ONLY, REVOKE}; BLOCK/UNBLOCK запрещены.
      - Для WALLET_ONLY mirror_debit_account_id и mirror_credit_account_id равны 0.
      - Для остальных wallet_op оба счёта ≠ 0 и ≠ друг другу.
      - process_hash уникален.

# ── Секция 4. Сценарий ──────────────────────────────────────────────────────
scenario:
  steps:
    - step: 1
      title: Переброска между кошельками
      actor: chairman
      action: ledger2::walmove
      description: >
        Председатель оформляет ручную корректировку: указывает username
        пайщика, исходный и целевой кошельки, сумму, обязательное memo
        с обоснованием и process_hash от backend. Контракт применяет
        одну inline операцию walletop с op_code = WALLET_ONLY (без
        бухгалтерских проводок). Аудит-след — запись в blockchain_actions.
      pre:
        - Председатель уполномочен (coopname@active).
        - Кошельки относятся к одному пайщику и одному счёту.
        - Сумма ≤ доступного остатка на исходном кошельке.
      post:
        - В blockchain_actions появилась запись с process_type p.adj.fix
          и code o.adj.walmove.
        - Аналитический сдвиг на кошельках пайщика выполнен.

    - step: 2
      title: Откат операции (отдельный сценарий)
      actor: system
      action: ledger2::revert
      description: >
        Контракт-инициатор (например, registrator при отмене регистрации
        с отзывом средств) вызывает revert, передавая id исходной записи
        в blockchain_actions, original_operation_code и подготовленные
        зеркальные параметры (mirror_wallet_op / mirror_wallet_from /
        mirror_wallet_to / mirror_debit_account_id / mirror_credit_account_id).
        Контракт ledger2 применяет inline walletop с зеркальными параметрами;
        для не-WALLET_ONLY дополнительно делает debit/credit-проводки.
      pre:
        - Авторизация из whitelisted контракта.
        - original_operation_code ≠ o.mig.*.
        - Зеркальные параметры валидны.
      post:
        - В blockchain_actions появилась запись отката с process_type p.adj.fix
          и code o.adj.rev, ссылающаяся на original_operation_id.
        - Состояние кошельков и счетов восстановлено в зеркало исходной операции.

  alternatives: []

# ── Секция 5. Документы и подписи ───────────────────────────────────────────
# Документы не требуются. Обоснование корректировки — обязательное поле memo
# (1..255 символов) в action; аудит-след фиксируется в blockchain_actions.
documents: []

# ── Секция 6. Операции ──────────────────────────────────────────────────────
operations:
  - ledger_code: o.adj.walmove
    human_name: Перевод между кошельками
    wallet_op: WALLET_ONLY     # фактический wallet_op — всегда WALLET_ONLY
    wallet_from: null          # параметры динамические
    wallet_to: null            # параметры динамические
    debit: null
    credit: null
    amount_ref: walmove.amount
    triggered_by: ledger2::walmove
    description: >
      Adjustment-операция: параметры задаются динамически каждый вызов и
      не зашиты в OPERATION_REGISTRY. Всегда WALLET_ONLY — переброска
      аналитических кошельков одного пайщика без бухпроводок.

  - ledger_code: o.adj.rev
    human_name: Откат операции
    wallet_op: null            # зеркало исходной (TRANSFER / WALLET_ONLY / REVOKE)
    wallet_from: null          # параметры из mirror_wallet_from
    wallet_to: null            # параметры из mirror_wallet_to
    debit: null
    credit: null
    amount_ref: original_operation.amount
    triggered_by: ledger2::revert
    description: >
      Adjustment-операция: зеркало ранее применённой операции. Параметры
      mirror_* подготавливаются backend-инициатором по записи в
      blockchain_actions. Для отката ISSUE используется wallet_op REVOKE
      (изъятие с источника). Откат миграционных операций запрещён.

# ── Секция 7. Связи ─────────────────────────────────────────────────────────
related:
  - process_type: p.reg.accept
    id: public_registrator_accept_process
    relation: affects
    note: >
      Любой штатный процесс может быть откатан через ledger2::revert —
      контракт-инициатор сам решает, нужно ли восстановить состояние своей
      сущности параллельно с откатом операции.

  - process_type: p.wal.depo
    id: public_wallet_deposit_process
    relation: affects
    note: >
      Аналогично — депозит может быть откатан вызовом revert из контракта
      wallet, если потребуется восстановить состояние до зачисления.
